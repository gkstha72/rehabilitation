<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>이동반 시간표 (주말)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/static/pretendard.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f6f3eb;
  --surface:#fff;
  --surface-mute:#faf7ef;
  --ink:#181818;
  --ink-soft:#555;
  --ink-mute:#9a9a9a;
  --line:#d8d4c5;
  --line-soft:#ece8d9;
  --line-strong:#181818;

  /* category colors — matched from print image */
  --c3:#fff0e0;  --c3-text:#7a4815;  --c3-hover:#ffe5cc;
  --c1:#f5a8c0;  --c1-text:#7a1f3d;  --c1-hover:#ef94b0;
  --ct:#b8e0a8;  --ct-text:#2c5e1e;  --ct-hover:#a5d695;
  --cw:#f5c842;  --cw-text:#6b5a05;  --cw-hover:#e3b836;
  --co:#5b9cd6;  --co-text:#fff;     --co-hover:#4a8bc7;
}

html{font-family:'Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
body{
  background:var(--bg);
  color:var(--ink);
  font-size:13px;
  line-height:1.4;
  font-feature-settings:"tnum" 1;
  min-height:100vh;
  padding:18px 22px 60px;
}
.app{max-width:1700px;margin:0 auto}

/* ===== HEADER ===== */
.header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:18px;
  border-bottom:2px solid var(--line-strong);
  padding-bottom:12px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.header h1{font-size:21px;font-weight:800;letter-spacing:-0.02em}
.header .sub{color:var(--ink-soft);font-size:12px;margin-top:3px}
.date-display{
  font-family:inherit;font-size:13px;font-weight:600;
  color:var(--ink-soft);min-height:30px;display:flex;align-items:center;
}
.date-display.has-date{
  color:var(--ink);background:#fff;
  border:1px solid var(--line);border-radius:5px;
  padding:5px 12px;
}
.date-display .placeholder{color:var(--ink-mute);font-weight:500;font-style:italic}
/* 날짜 선택 (달력 클릭 + 일수) */
.date-pick{
  display:inline-flex;align-items:center;gap:6px;
  background:#fff;border:1px solid var(--line);border-radius:5px;
  padding:4px 8px 4px 10px;cursor:pointer;
}
.date-pick:hover{border-color:#9db4d8;box-shadow:0 1px 4px rgba(40,70,140,.10)}
.date-pick .dp-label{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap}
.date-pick .dp-label.empty{color:var(--ink-mute);font-weight:500;font-style:italic}
.date-pick input[type="date"]{
  font-family:inherit;font-size:12px;color:var(--ink-soft);
  border:none;background:transparent;outline:none;cursor:pointer;padding:0;width:130px;
}
.date-pick select{
  font-family:inherit;font-size:12px;color:var(--ink-soft);
  border:1px solid var(--line);border-radius:4px;background:#fff;
  outline:none;cursor:pointer;padding:1px 3px;
}
.date-pick .dp-clear{
  border:none;background:transparent;cursor:pointer;
  color:var(--ink-mute);font-size:13px;line-height:1;padding:2px 3px;
}
.date-pick .dp-clear:hover{color:#b3352c}
.legend{display:flex;gap:7px;flex-wrap:wrap}
.legend-chip{
  display:flex;align-items:center;gap:5px;
  padding:3px 8px 3px 4px;border:1px solid var(--line);
  border-radius:4px;font-size:11px;font-weight:600;
  background:#fff;
}
.legend-chip .sw{
  width:24px;height:18px;border-radius:2px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;
}
.lc-3 .sw{background:var(--c3);color:var(--c3-text)}
.lc-1 .sw{background:var(--c1);color:var(--c1-text)}
.lc-t .sw{background:var(--ct);color:var(--ct-text)}
.lc-w .sw{background:var(--cw);color:var(--cw-text)}
.lc-o .sw{background:var(--co);color:#fff}

/* ===== DASHBOARD ===== */
.dash{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:7px;margin-bottom:12px;
}
.dash .card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:5px;padding:7px 10px;
}
.card-lbl{font-size:10px;color:var(--ink-mute);font-weight:700;letter-spacing:0.04em}
.card-val{
  font-size:21px;font-weight:700;margin-top:2px;
  font-variant-numeric:tabular-nums;letter-spacing:-0.02em;
}
.card-val .unit{font-size:12px;color:var(--ink-soft);font-weight:500;margin-left:3px}
.card.c3 .card-val{color:var(--c3-text)}
.card.c1 .card-val{color:var(--c1-text)}
.card.ct .card-val{color:var(--ct-text)}
.card.cw .card-val{color:var(--cw-text)}
.card.co .card-val{color:#13395c}

/* ===== TOOLBAR ===== */
.toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
/* 워크플로우 그룹: 시각적으로 묶음 */
.tb-group{
  display:flex;align-items:center;gap:6px;
  padding:4px 8px;border-radius:7px;background:rgba(255,255,255,.5);
  border:1px solid var(--line-soft);position:relative;
}
.tb-group.step::before{
  content:attr(data-step) ". " attr(data-label);
  position:absolute;top:-7px;left:6px;
  background:#181818;color:#fff;font-size:10px;font-weight:700;
  padding:1px 8px;border-radius:8px;line-height:1.3;letter-spacing:.3px;
  white-space:nowrap;
}
.tb-group.danger{background:rgba(253,230,234,.4);border-color:#e8c4cc;position:relative}
.tb-group.danger::before{
  content:"초기화";position:absolute;top:-7px;left:6px;
  background:#9a2233;color:#fff;font-size:10px;font-weight:700;
  padding:1px 7px;border-radius:8px;line-height:1.3;letter-spacing:.5px;
}
.tb-divider{width:1px;height:22px;background:var(--line);margin:0 2px}
.tabs{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:5px;padding:3px}
.tab{
  background:transparent;border:none;padding:6px 14px;
  font-size:12px;font-weight:600;color:var(--ink-soft);
  cursor:pointer;border-radius:3px;font-family:inherit;
  transition:all .12s;
}
.tab.active{background:var(--ink);color:#fff}
.tab:not(.active):hover{background:var(--surface-mute);color:var(--ink)}
.btn{
  background:var(--surface);border:1px solid var(--line);
  padding:6px 11px;font-size:12px;font-weight:500;color:var(--ink);
  cursor:pointer;border-radius:5px;font-family:inherit;
  transition:all .12s;display:inline-flex;align-items:center;gap:4px;
}
.btn:hover{background:var(--surface-mute);border-color:var(--ink-mute)}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:#000}
.btn.danger{color:#9a2233}
.btn.danger:hover{background:#fde6ea;border-color:#9a2233}
/* 약한 톤 버튼 — 초기화처럼 위험하지만 자주 안 쓰는 버튼 */
.btn.subtle{color:var(--ink-soft);background:transparent;border-color:transparent}
.btn.subtle:hover{background:#fff;border-color:var(--line)}
.spacer{flex:1}

/* ===== SCHEDULE WRAPPER ===== */
.sched-wrap{
  background:var(--surface);border:1px solid var(--line);
  border-radius:6px;padding:14px;
  overflow:auto;max-height:78vh;
}
.ward-page{margin-bottom:30px}
.ward-page:last-child{margin-bottom:0}
.ward-title{
  font-size:14px;font-weight:700;
  margin-bottom:8px;padding:6px 12px;
  background:var(--surface-mute);
  border-left:3px solid var(--ink);
  letter-spacing:-0.01em;
}
.weekday-label{
  font-size:11px;font-weight:700;
  text-align:center;color:var(--ink-soft);
  margin-bottom:4px;letter-spacing:0.05em;
}
.session-row{
  display:flex;gap:12px;align-items:flex-start;
  margin-bottom:14px;
}
.session-row:last-child{margin-bottom:0}

/* 4개 표 블록 레이아웃 — 화면에서는 2개씩 줄바꿈, 인쇄에서는 한 줄 */
.session-grid{
  display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start;
}
.tbl-block{display:inline-block}
.blk-label{
  font-size:11px;font-weight:700;text-align:center;
  color:var(--ink-soft);margin-bottom:4px;letter-spacing:0.04em;
}

/* ===== TABLES ===== */
table.sched{
  border-collapse:separate;border-spacing:0;
  font-variant-numeric:tabular-nums;
  background:#fff;
  border:1.5px solid var(--ink);
}
table.sched th, table.sched td{
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:0;text-align:center;vertical-align:middle;
  background:var(--surface);
}
table.sched tr:last-child td, table.sched tr:last-child th{border-bottom:none}
table.sched th:last-child, table.sched td:last-child{border-right:none}

/* Header */
table.sched thead th{
  background:#ebe5d3;
  font-weight:700;font-size:11px;
  color:var(--ink);
  padding:6px 4px;
  border-bottom:1.5px solid var(--ink);
}
table.sched .col-room{min-width:32px;width:32px}
table.sched .col-name{min-width:64px;width:64px}
table.sched .col-time{min-width:56px;width:56px}

/* Cells */
.room-cell{
  background:var(--surface-mute) !important;
  font-weight:700;font-size:12px;
  padding:0 2px;
  border-right:1.5px solid var(--ink) !important;
}
.name-cell{
  padding:0;
  border-right:1.5px solid var(--ink) !important;
}
.name-cell input{
  width:100%;height:100%;
  border:none;background:transparent;
  text-align:center;
  font-family:inherit;font-size:12px;font-weight:500;
  padding:4px 2px;color:var(--ink);
  outline:none;min-height:24px;
}
.name-cell input:focus{background:#fffbe6}
.name-cell input::placeholder{color:#ccc}
.name-cell.tag-1 input{color:var(--c1-text);font-weight:600}
.name-cell.tag-3 input{color:var(--c3-text);font-weight:600}
.name-cell.tag-w input{color:var(--cw-text);font-weight:600}
.name-cell.tag-o input{color:#13395c;font-weight:600}
.name-cell.excluded input{color:var(--ink-mute);text-decoration:line-through}

/* Patient row separator (every 4th row, except inside same room) */
.room-end td, .room-end th{border-bottom:1.5px solid var(--ink) !important}

/* Data cells */
.cell{
  cursor:pointer;user-select:none;
  font-weight:700;font-size:12px;
  height:24px;
  transition:filter .1s;
}
.cell.empty{color:transparent;background:#fff}
.cell:hover{outline:2px solid var(--ink);outline-offset:-2px;z-index:1;position:relative}
.cell.has-3{background:var(--c3);color:var(--c3-text)}
.cell.has-3:hover{background:var(--c3-hover)}
.cell.has-1{background:var(--c1);color:var(--c1-text)}
.cell.has-1:hover{background:var(--c1-hover)}
.cell.has-t{background:var(--ct);color:var(--ct-text)}
.cell.has-t:hover{background:var(--ct-hover)}
.cell.has-w{background:var(--cw);color:var(--cw-text)}
.cell.has-w:hover{background:var(--cw-hover)}
.cell.has-o{background:var(--co);color:#fff}
.cell.has-o:hover{background:var(--co-hover)}

/* 버튼 인디케이터 - 불러옴 표시 */
.ind{
  display:inline-block;
  margin-left:5px;
  padding:1px 6px;
  background:#2c5e1e;
  color:#fff;
  font-size:10px;
  font-weight:700;
  border-radius:8px;
  vertical-align:middle;
}
.ind:empty{display:none}

/* ===== CELL PICKER ===== */
.picker{
  position:fixed;z-index:1000;
  background:var(--surface);border:1.5px solid var(--ink);
  border-radius:6px;padding:6px;
  box-shadow:0 8px 28px rgba(0,0,0,0.2);
  display:none;
}
.picker.show{display:flex;gap:4px;flex-wrap:nowrap}
.picker button{
  border:none;padding:6px 10px;
  font-family:inherit;font-size:12px;font-weight:700;
  border-radius:4px;cursor:pointer;min-width:48px;
}
.picker .p3{background:var(--c3);color:var(--c3-text)}
.picker .p1{background:var(--c1);color:var(--c1-text)}
.picker .pt{background:var(--ct);color:var(--ct-text)}
.picker .pw{background:var(--cw);color:var(--cw-text)}
.picker .po{background:var(--co);color:#fff}
.picker .pclr{background:#eee;color:var(--ink-soft)}
.picker button:hover{filter:brightness(1.04)}

/* ===== HELP / STATUS ===== */
.help{
  margin-top:10px;padding:8px 12px;
  background:var(--surface);border:1px solid var(--line);
  border-radius:5px;font-size:11px;color:var(--ink-soft);
  display:flex;gap:18px;flex-wrap:wrap;
}
.help b{color:var(--ink)}
.help kbd{
  background:#f0ece0;border:1px solid var(--line);
  border-radius:3px;padding:1px 5px;
  font-size:10px;font-weight:600;
}
.status{
  position:fixed;bottom:14px;right:18px;
  background:var(--ink);color:#fff;
  padding:7px 13px;border-radius:5px;
  font-size:11px;font-weight:500;
  opacity:0;pointer-events:none;
  transition:opacity .2s;z-index:999;
}
.status.show{opacity:1}
.hidden-input{display:none}

/* ===== 검증 패널 ===== */
.verify-panel{
  margin-bottom:12px;border-radius:8px;overflow:hidden;
  border:1.5px solid #b9c8e6;font-size:13px;
  box-shadow:0 2px 8px rgba(40,70,140,.08);
}
.vf-head{padding:10px 14px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.vf-head.ok{background:#e6f6ec;color:#1c7a3f}
.vf-head.bad{background:#fdecec;color:#b3352c}
.vf-close{margin-left:auto;background:transparent;border:none;font-size:15px;cursor:pointer;color:inherit;opacity:.6}
.vf-close:hover{opacity:1}
.vf-sec{padding:8px 14px;background:#fff;border-top:1px solid #eef1f6}
.vf-sec-title{font-weight:700;font-size:12.5px;color:#3a4a63;margin-bottom:5px}
.vf-hint{font-weight:400;color:#8a97ab;font-size:11.5px}
.vf-row{padding:3px 0;color:#333;line-height:1.5;border-top:1px dashed #eef1f6}
.vf-row:first-of-type{border-top:none}
.vf-row .vf-room{font-weight:700;color:#2c3e5c;min-width:38px;display:inline-block}
.vf-row .vf-day{font-weight:700;color:#7a5aa0;margin-right:4px}
.vf-row .vf-nm{font-weight:600}
.vf-row .vf-slot{color:#7a869a;font-size:12px}
.vf-row b{color:#111}
.vf-names{color:#667;font-size:12px}
.vf-more{color:#8a97ab;font-size:12px;padding:4px 0}
.vf-foot{padding:8px 14px;background:#f7f9fc;color:#7a869a;font-size:11.5px;border-top:1px solid #eef1f6}

/* ===== PRINT — A3 portrait, 한 병동 = 한 장 ===== */
@page{size:A3 portrait;margin:4mm}
@media print{
  html,body{width:289mm;padding:0;margin:0;background:#fff;font-size:8pt;color:#000;line-height:1}
  .header,.dash,.toolbar,.help,.status,.legend,.picker,.verify-panel{display:none !important}
  .sched-wrap{max-height:none;overflow:visible;border:none;border-radius:0;padding:0;background:#fff}
  .ward-page{
    page-break-after:always;page-break-inside:avoid;
    break-inside:avoid;break-after:page;
    margin:0;background:#fff;
    width:289mm;overflow:visible;
  }
  .ward-page:last-child{page-break-after:auto;break-after:auto}
  .ward-title{
    font-size:13pt;font-weight:700;color:#000;line-height:1.1;
    padding:0 0 2mm;background:#fff;border:none;text-align:left;
  }
  /* 표 2개씩 한 줄 (오전 줄 / 오후 줄) — A3 세로 한 장, 크게 */
  .session-grid{
    display:flex !important;flex-wrap:nowrap !important;
    gap:5mm;align-items:flex-start;margin-bottom:4mm;
  }
  .tbl-block{flex:0 0 auto}
  /* 각 줄의 첫 블록(좌측 표) 자리를 오후 표(시간 7칸=134mm) 너비로 고정.
     표 자체는 본래 너비(오전 106mm)를 유지하고 왼쪽 정렬 →
     오전·우 표와 오후·우 표의 시작 x좌표가 정확히 일치, 시간칸 너비는 통일 */
  .session-grid > .tbl-block:first-child{
    width:134mm;flex:0 0 134mm;
  }
  .blk-label{display:none !important}
  table.sched{width:auto;table-layout:fixed;font-size:12pt;border:1.2pt solid #000;background:#fff;border-collapse:collapse}
  table.sched th, table.sched td{border:0.6pt solid #888;line-height:1;vertical-align:middle}
  table.sched thead th{
    font-size:11pt;padding:1mm 0.3mm;line-height:1;
    background:#e8e8e8 !important;color:#000;font-weight:700;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
    border-bottom:1.2pt solid #000;
  }
  table.sched .col-room{min-width:10mm;width:10mm}
  table.sched .col-name{min-width:26mm;width:26mm}
  table.sched .col-time{min-width:14mm;width:14mm}
  .room-cell{
    font-size:13pt;padding:0 0.5mm;font-weight:700;color:#000;line-height:1;
    background:#f0ede4 !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
    border-right:1.2pt solid #000 !important;
  }
  .name-cell{border-right:1.2pt solid #000 !important;background:#fff;padding:0}
  .name-cell input{
    font-size:12.5pt;padding:0 0.5mm;color:#000 !important;line-height:1;
    font-weight:700;min-height:0;background:#fff;height:5.5mm;
  }
  .name-cell.tag-1 input,
  .name-cell.tag-3 input,
  .name-cell.tag-w input,
  .name-cell.tag-o input{color:#000 !important;font-weight:700}
  .name-cell.excluded input{color:#888 !important;font-weight:400}
  .room-end td, .room-end th{border-bottom:1.2pt solid #000 !important}
  .cell{
    height:5.5mm;padding:0;line-height:1;
    font-size:12.5pt;font-weight:800;color:#000 !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  /* 카테고리: 구분되는 연한 배경 + 검정 굵은 글씨 */
  .cell.has-3{background:#fff0e0 !important;color:#000 !important}  /* 3층: 최대한 연한 살구 */
  .cell.has-1{background:#f9aac4 !important;color:#000 !important}  /* 1층: 분홍 */
  .cell.has-t{background:#a8dd8d !important;color:#000 !important}  /* 통증: 초록 */
  .cell.has-w{background:#f5c842 !important;color:#000 !important}  /* 병동: 머스타드(진한 노랑) */
  .cell.has-o{background:#8fc0ec !important;color:#000 !important}  /* 외래: 파랑 */

  /* 한 병동만 인쇄할 때: print-single 클래스로 단일 페이지 강제 */
  body.print-single .ward-page{page-break-after:auto;break-after:auto}
}


</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <h1>이동반 시간표 <span style="font-size:14px;color:var(--ink-soft);font-weight:600">· 주말</span></h1>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <div id="date-display" class="date-display"></div>
    </div>
    <div class="legend">
      <div class="legend-chip lc-3"><span class="sw">3층</span></div>
      <div class="legend-chip lc-1"><span class="sw">1층</span></div>
      <div class="legend-chip lc-t"><span class="sw">통증</span></div>
    </div>
  </div>

  <div class="toolbar">
    <!-- 보기 전환: 병동 + 요일 -->
    <div class="tabs">
      <button class="tab active" data-floor="4">4병동</button>
      <button class="tab" data-floor="5">5병동</button>
      <button class="tab" data-floor="all">전체</button>
    </div>
    <div class="day-toggle" id="day-toggle" style="display:flex;gap:0;margin-left:8px;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:#fff"></div>

    <div class="spacer"></div>

    <!-- 1. 병실현황 -->
    <div class="tb-group step" data-step="1" data-label="병실현황" title="환자명 가져오기">

    <div class="tb-group step" data-step="2" data-label="합산 자동입력" title="시간표 자동 채우기">
      <button class="btn" onclick="document.getElementById('combined-input').click()" style="background:linear-gradient(180deg,#fff,#ffe8d4)">🧠💪 합산 자동입력<span class="ind" id="ind-combined"></span></button>

    <!-- 3. 인쇄 -->
    <div class="tb-group step" data-step="3" data-label="인쇄" title="인쇄">

      <button class="btn primary" onclick="printWard('5')">🖨 5병동</button>

    <div class="tb-group step" data-step="4" data-label="검증" title="원본과 대조">
      <button class="btn" onclick="runVerification()" style="background:linear-gradient(180deg,#fff,#e8f0ff)">🔍 검증</button>
    </div>

    <!-- 초기화 (분리됨) -->
    <div class="tb-group danger" title="초기화">
      <button class="btn subtle" onclick="clearRosterOnly()" title="환자명만 비움 (시간표는 유지)">🧑 환자명만</button>
      <button class="btn subtle" onclick="clearScheduleOnly()" title="시간표 셀만 비움 (환자명은 유지)">📋 시간표만</button>
      <button class="btn danger" onclick="clearCells()" title="환자명 + 시간표 모두 비움">🗑 모두</button>
    </div>

    <input type="file" id="combined-input" class="hidden-input" accept=".xlsx,.xls" onchange="autoFillDaily(event)">
    <input type="file" id="backup-input" class="hidden-input" accept=".xlsx,.xls,.json" onchange="importBackup(event)">
  </div>

  <div class="sched-wrap">
    <div id="verify-panel" class="verify-panel" style="display:none"></div>
    <div id="sched-content"></div>
  </div>

</div>

<div class="picker" id="picker">
  <button class="p3" onclick="pickValue('3층')">3층</button>
  <button class="p1" onclick="pickValue('1층')">1층</button>
  <button class="pt" onclick="pickValue('통증')">통증</button>
  <button class="pclr" onclick="pickValue(null)">지움</button>
</div>

<div class="status" id="status"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
// ===== 설정 =====
const TIME_SLOTS_AM = [
  {short:"09:00", label:"09:00"},
  {short:"09:35", label:"09:35"},
  {short:"10:10", label:"10:10"},
  {short:"10:45", label:"10:45"},
  {short:"11:20", label:"11:20"},
  {short:"11:55", label:"11:55"}
];
const TIME_SLOTS_PM = [
  {short:"01:30", label:"01:30"},
  {short:"02:05", label:"02:05"},
  {short:"02:40", label:"02:40"},
  {short:"03:15", label:"03:15"},
  {short:"03:50", label:"03:50"},
  {short:"04:25", label:"04:25"},
  {short:"05:00", label:"05:00"}
];

const ROOMS_4F_LEFT  = [401,402,403,404,405,406,407,408];
const ROOMS_4F_RIGHT = [409,410,411,412,413,414,415];
const ROOMS_5F_LEFT  = [501,502,503,504,505,506,507,508];
const ROOMS_5F_RIGHT = [509,510,511,512,513,514,515];
const ALL_ROOMS = [...ROOMS_4F_LEFT,...ROOMS_4F_RIGHT,...ROOMS_5F_LEFT,...ROOMS_5F_RIGHT];
const PATIENTS_PER_ROOM = 4;
const STORAGE_KEY = 'idongban_weekend_v1';

const CATEGORIES = {
  '3층':{cls:'has-3'},
  '1층':{cls:'has-1'},
  '통증':{cls:'has-t'}
};

// ===== 상태 =====
// 주말 버전: 여러 날(보통 토·일, 공휴일이 끼면 3일 이상)의 셀을 분리 저장. 환자명은 공통.
// dayList: [{key:'금', date:'2026-07-17'}, {key:'토', ...}, {key:'일', ...}]
//   key = 요일 한 글자. 같은 주말 안에서 요일이 겹치지 않으므로 키로 사용 가능.
const WD_NAMES = ['일','월','화','수','목','금','토'];
let DAYS = ['토','일'];   // dayList와 동기화되는 요일 키 배열 (기존 코드 호환)

function syncDays(){
  DAYS = (state.dayList && state.dayList.length)
    ? state.dayList.map(d=>d.key)
    : ['토','일'];
  return DAYS;
}
function makeEmptyDayMap(){
  const o = {};
  syncDays().forEach(d=>{ o[d] = {}; });
  return o;
}
// 날짜 문자열 'YYYY-MM-DD' → 요일 키('토' 등)
function wdKeyOf(iso){
  const [y,m,d] = String(iso).split('-').map(Number);
  return WD_NAMES[new Date(y, m-1, d).getDay()];
}
// 시작일 + 일수 → dayList 생성
function buildDayList(startISO, count){
  const [y,m,d] = String(startISO).split('-').map(Number);
  const out = [];
  for(let i=0; i<count; i++){
    const dt = new Date(y, m-1, d+i);
    const iso = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    out.push({ key: WD_NAMES[dt.getDay()], date: iso });
  }
  return out;
}
// dayList가 바뀔 때 각 방의 cellsByDay를 새 요일 구성에 맞게 정리(기존 값 유지)
function reconcileDayMaps(){
  const keys = syncDays();
  ALL_ROOMS.forEach(r=>{
    const cur = state.rooms[r].cellsByDay || {};
    const next = {};
    keys.forEach(k=>{ next[k] = cur[k] || {}; });
    state.rooms[r].cellsByDay = next;
  });
  const curSrc = state.cellSourceByDay || {};
  const nextSrc = {};
  keys.forEach(k=>{ nextSrc[k] = curSrc[k] || {}; });
  state.cellSourceByDay = nextSrc;
  if(!keys.includes(state.activeDay)) state.activeDay = keys[0];
}

let state = {
  date:'',                // 첫날(보통 토요일) 날짜
  dayList:[],             // [{key,date}] — 비어있으면 토·일 2일로 간주
  view:'4',
  activeDay:'토',          // 현재 화면에 보이는 요일
  loadCounts:{roster:0, combined:0},
  // rooms[room]: {
  //   patients:[{name}×4],   ← 모든 요일 공통
  //   cellsByDay: { '토': {key→cat}, '일': {...}, ... }
  // }
  rooms:{},
  // 자동입력 시 셀이 태그(override)로 채워졌는지 추적 — 요일별로 분리
  cellSourceByDay:{}
};

let pickerCtx = null;

// ===== 검증용: 자동입력에 사용된 원본 워크북 보관 (세션 메모리) =====
// 새로고침하면 사라지므로, 검증 시엔 파일을 다시 불러온 뒤 눌러야 함.
let lastImportWb = null;  // { wb, sheetMap:{요일키: 시트명} }

function makeCellKey(room, p, slot){ return `${room}-${p}-${slot}`; }

// 활성 요일의 cells 객체 반환 (room 기준)
function getActiveCells(room){
  return state.rooms[room].cellsByDay[state.activeDay];
}
// 특정 요일의 cells 객체 반환
function getCellsForDay(room, day){
  return state.rooms[room].cellsByDay[day];
}
// 활성 요일의 cellSource 반환
function getActiveCellSource(){
  return state.cellSourceByDay[state.activeDay];
}

function initState(){
  ALL_ROOMS.forEach(r=>{
    state.rooms[r] = {
      patients: Array.from({length:PATIENTS_PER_ROOM},()=>({name:''})),
      cellsByDay: makeEmptyDayMap()
    };
  });
  state.cellSourceByDay = makeEmptyDayMap();
}

// ===== 태그 처리 =====
function nameTagInfo(name){
  if(!name) return {display:'', tag:null, excluded:false};
  let s = name;
  // 제외 태그
  if(/\(침상\)|\(HOLD\)/i.test(s)) return {display:s, tag:null, excluded:true};

  // 강제 카테고리 (변환표 적용)
  let forceTag = null;
  // (치료실→병동) → 3층 으로 강제 + 태그 제거
  if(/\(치료실\s*[→\->]+\s*병동\)/.test(s)){
    forceTag = '3층';
    s = s.replace(/\(치료실\s*[→\->]+\s*병동\)/g, '');
  }
  // (병동→치료실) 표시는 그대로 제거 (주말은 병동 카테고리 없음)
  s = s.replace(/\(병동\s*[→\->]+\s*치료실\)/g, '');
  s = s.trim();

  // 일반 태그 감지 (주말: 1층/3층/통증만)
  let tag = forceTag;
  if(!tag){
    if(/\(1층\)/.test(s)) tag = '1층';
    else if(/\(3층\)/.test(s)) tag = '3층';
    else if(/\(통증\)/.test(s)) tag = '통증';
  }
  return {display:s, tag, excluded:false};
}

// ===== 저장 =====
function saveLocal(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
// 오늘이 속한 주말(토요일 날짜)을 'YYYY-MM-DD'로 반환.
// 토요일이면 오늘, 일요일이면 어제(토), 평일이면 그 주 토요일.
function getCurrentWeekendSaturday(){
  const d = new Date();
  const wd = d.getDay();  // 0=일 … 6=토
  if(wd === 0) d.setDate(d.getDate() - 1);        // 일 → 전날(토)
  else if(wd !== 6) d.setDate(d.getDate() + (6 - wd));  // 평일 → 그 주 토요일
  const y = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${mo}-${da}`;
}
function loadLocal(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const loaded = JSON.parse(raw);
    if(loaded && loaded.rooms){
      // 저장된 요일 구성을 먼저 복원해야 셀 맵이 올바른 키로 만들어짐
      if(Array.isArray(loaded.dayList) && loaded.dayList.length){
        state.dayList = loaded.dayList.filter(d=>d && d.key);
      }else if(loaded.date){
        // 구버전(토·일 고정) 호환 — 저장된 날짜를 첫날로 보고 2일 구성
        state.dayList = buildDayList(loaded.date, 2);
      }
      syncDays();
      reconcileDayMaps();
      ALL_ROOMS.forEach(r=>{
        if(loaded.rooms[r]){
          if(Array.isArray(loaded.rooms[r].patients)){
            for(let p=0;p<PATIENTS_PER_ROOM;p++){
              if(loaded.rooms[r].patients[p]){
                state.rooms[r].patients[p] = loaded.rooms[r].patients[p];
              }
            }
          }
          // 새 구조 (cellsByDay)
          if(loaded.rooms[r].cellsByDay){
            DAYS.forEach(d=>{
              if(loaded.rooms[r].cellsByDay[d]){
                state.rooms[r].cellsByDay[d] = {...loaded.rooms[r].cellsByDay[d]};
              }
            });
          }
          // 구 구조 (cells) — 토요일로 마이그레이션
          else if(loaded.rooms[r].cells){
            state.rooms[r].cellsByDay[syncDays()[0]] = {...loaded.rooms[r].cells};
          }
        }
      });
      state.date = loaded.date || (state.dayList[0] ? state.dayList[0].date : '');
      state.view = loaded.view || '4';
      state.activeDay = (loaded.activeDay && syncDays().includes(loaded.activeDay))
        ? loaded.activeDay
        : syncDays()[0];
      if(loaded.loadCounts) state.loadCounts = {...state.loadCounts, ...loaded.loadCounts};
      if(loaded.cellSourceByDay){
        DAYS.forEach(d=>{
          if(loaded.cellSourceByDay[d]){
            state.cellSourceByDay[d] = {...loaded.cellSourceByDay[d]};
          }
        });
      }
      return true;
    }
  }catch(e){}
  return false;
}

function showStatus(msg){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(()=>el.classList.remove('show'), 1700);
}

// ===== 셀 픽커 =====
function openPicker(room, p, slot, evt){
  pickerCtx = {room, p, slot};
  const picker = document.getElementById('picker');
  picker.classList.add('show');
  const rect = evt.currentTarget.getBoundingClientRect();
  let x = rect.left;
  let y = rect.bottom + 4;
  const pw = 360, ph = 38;
  if(x + pw > window.innerWidth - 8) x = window.innerWidth - pw - 8;
  if(y + ph > window.innerHeight - 8) y = rect.top - ph - 4;
  picker.style.left = Math.max(8, x) + 'px';
  picker.style.top = y + 'px';
  evt.stopPropagation();
}
function closePicker(){
  document.getElementById('picker').classList.remove('show');
  pickerCtx = null;
}
function pickValue(val){
  if(!pickerCtx) return;
  const {room, p, slot} = pickerCtx;
  const key = makeCellKey(room, p, slot);
  const cells = getActiveCells(room);
  if(val === null) delete cells[key];
  else cells[key] = val;
  saveLocal();
  closePicker();
  render();
}

document.addEventListener('click', (e)=>{
  if(!e.target.closest('.picker') && !e.target.closest('.cell')){
    closePicker();
  }
});

// ===== 환자명 편집 =====
// 이름 입력 (oninput) — 상태만 갱신, 재렌더 안 함 (커서 점프 방지)
function setNameRaw(room, p, val){
  state.rooms[room].patients[p].name = val;
  saveLocal();
}

// 이름 확정 (onchange = 포커스 해제) — 정규화 + 재렌더
function commitName(room, p){
  state.rooms[room].patients[p].name = (state.rooms[room].patients[p].name || '').trim();
  saveLocal();
  render();
}

function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

// ===== 렌더링 =====
function getWardSections(){
  if(state.view === '4') return [
    {label:'4병동', left:ROOMS_4F_LEFT, right:ROOMS_4F_RIGHT}
  ];
  if(state.view === '5') return [
    {label:'5병동', left:ROOMS_5F_LEFT, right:ROOMS_5F_RIGHT}
  ];
  return [
    {label:'4병동', left:ROOMS_4F_LEFT, right:ROOMS_4F_RIGHT},
    {label:'5병동', left:ROOMS_5F_LEFT, right:ROOMS_5F_RIGHT}
  ];
}

function buildHalfTable(rooms, slots){
  // rooms: 배열, slots: 시간 슬롯 배열
  let html = '<table class="sched">';
  html += '<thead><tr>';
  html += '<th class="col-room">호실</th>';
  html += '<th class="col-name">이름</th>';
  slots.forEach(s=>{
    html += `<th class="col-time">${s.label}</th>`;
  });
  html += '</tr></thead><tbody>';

  rooms.forEach(room=>{
    for(let p=0;p<PATIENTS_PER_ROOM;p++){
      const rowEnd = (p === PATIENTS_PER_ROOM - 1);
      html += `<tr${rowEnd?' class="room-end"':''}>`;
      // 호실 칸 (병합)
      if(p===0){
        html += `<td class="room-cell" rowspan="${PATIENTS_PER_ROOM}">${room}</td>`;
      }
      // 이름 칸
      const patient = state.rooms[room].patients[p];
      const info = nameTagInfo(patient.name);
      let tagCls = '';
      if(info.excluded) tagCls = 'excluded';
      else if(info.tag === '1층') tagCls = 'tag-1';
      else if(info.tag === '3층') tagCls = 'tag-3';
      else if(info.tag === '통증') tagCls = 'tag-t';
      // 표시값: 제외(HOLD/침상)면 빈칸, 그 외엔 변환된 표시명
      const displayValue = info.excluded ? '' : info.display;
      // 원본은 title로 보존 (호버하면 확인 가능)
      const titleAttr = info.excluded || info.display !== patient.name
        ? ` title="${escapeHtml(patient.name)}"` : '';
      html += `<td class="name-cell ${tagCls}"${titleAttr}>
        <input type="text" value="${escapeHtml(displayValue)}"
          oninput="setNameRaw(${room},${p},this.value)"
          onchange="commitName(${room},${p})"
          placeholder="">
      </td>`;
      // 시간 셀들 (활성 요일의 cells)
      const cells = getActiveCells(room);
      slots.forEach(slot=>{
        const key = makeCellKey(room, p, slot.short);
        const v = cells[key];
        let cls = 'cell';
        if(v && CATEGORIES[v]) cls += ' '+CATEGORIES[v].cls;
        else cls += ' empty';
        const text = v || '';
        html += `<td class="${cls}" data-room="${room}" data-p="${p}" data-slot="${slot.short}">${text}</td>`;
      });
      html += '</tr>';
    }
  });
  html += '</tbody></table>';
  return html;
}

// 활성 요일의 날짜 문자열. dayList에 날짜가 있으면 그걸 쓰고,
// 없으면 state.date(첫날) 기준으로 순서만큼 더해 계산 (하위호환).
function dateOfDay(dayKey){
  const list = state.dayList || [];
  const hit = list.find(d=>d.key === dayKey);
  if(hit && hit.date) return hit.date;
  if(!state.date) return '';
  const idx = Math.max(0, syncDays().indexOf(dayKey));
  try{
    const [y,m,d] = state.date.split('-').map(Number);
    const dt = new Date(y, m-1, d+idx);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }catch(e){ return ''; }
}
function getDayDateStr(){
  const iso = dateOfDay(state.activeDay);
  return iso ? formatDateKorean(iso) : '';
}

function renderTable(){
  const target = document.getElementById('sched-content');
  const sections = getWardSections();
  const dateStr = getDayDateStr();
  const dayLabel = `${state.activeDay}요일`;

  let html = '';
  sections.forEach(sec=>{
    html += `<div class="ward-page">`;
    html += `<div class="ward-title">[${sec.label}] ${dateStr ? dateStr+' ' : dayLabel+' '}이동반 시간표</div>`;

    html += `<div class="session-grid">`;
    html += `<div class="tbl-block"><div class="blk-label">오전 · 좌</div>${buildHalfTable(sec.left, TIME_SLOTS_AM)}</div>`;
    html += `<div class="tbl-block"><div class="blk-label">오전 · 우</div>${buildHalfTable(sec.right, TIME_SLOTS_AM)}</div>`;
    html += `</div>`;
    html += `<div class="session-grid">`;
    html += `<div class="tbl-block"><div class="blk-label">오후 · 좌</div>${buildHalfTable(sec.left, TIME_SLOTS_PM)}</div>`;
    html += `<div class="tbl-block"><div class="blk-label">오후 · 우</div>${buildHalfTable(sec.right, TIME_SLOTS_PM)}</div>`;
    html += `</div>`;

    html += `</div>`;
  });

  target.innerHTML = html;

  // 셀 클릭
  target.querySelectorAll('.cell').forEach(cell=>{
    cell.addEventListener('click', e=>{
      const room = parseInt(cell.dataset.room);
      const p = parseInt(cell.dataset.p);
      const slot = cell.dataset.slot;
      openPicker(room, p, slot, e);
    });
  });
}

function formatDateKorean(iso){
  if(!iso) return '';
  try{
    const [y,m,d] = iso.split('-').map(Number);
    const date = new Date(y,m-1,d);
    const wd = ['일','월','화','수','목','금','토'][date.getDay()];
    return `${m}월 ${d}일 ${wd}요일`;
  }catch(e){return ''}
}

function render(){
  renderTable();
}

// ===== 컨트롤 =====
function setView(v){
  state.view = v;
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.floor===v);
  });
  saveLocal();
  render();
}

function clearAll(){
  if(!confirm('정말 모든 셀과 환자명을 지울까요?')) return;
  initState();
  saveLocal();
  render();
  showStatus('모두 지웠습니다');
}

// 특정 병동만 임시로 표시한 뒤 인쇄 (A3 한 장)

// ===== 엑셀 저장 (토/일 각각 시트로) =====
function exportXLSX(){
  try{
    const wb = XLSX.utils.book_new();
    const allSlots = [...TIME_SLOTS_AM, ...TIME_SLOTS_PM];
    const header = ['호실','이름'].concat(allSlots.map(s=>s.short));

    DAYS.forEach(day=>{
      const rows = [header];
      ALL_ROOMS.forEach(room=>{
        const cells = getCellsForDay(room, day);
        state.rooms[room].patients.forEach((pt, p)=>{
          const row = [
            (p===0) ? room : '',
            pt.name || ''
          ];
          allSlots.forEach(s=>{
            const key = makeCellKey(room, p, s.short);
            row.push(cells[key] || '');
          });
          rows.push(row);
        });
      });

      // 메타데이터
      rows.push([]);
      rows.push(['__meta__','요일',day]);
      rows.push(['__meta__','토요일 날짜',state.date || '']);
      rows.push(['__meta__','저장일시',new Date().toISOString()]);

      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [
        {wch:7}, {wch:14},
        ...allSlots.map(()=>({wch:8}))
      ];
      XLSX.utils.book_append_sheet(wb, ws, `${day}요일`);
    });

    const stamp = state.date || new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `이동반_시간표_주말_${stamp}.xlsx`);
    showStatus('엑셀 파일로 저장 완료 (토/일 시트)');
  }catch(err){
    alert('저장 실패: '+err.message);
  }
}

// ===== 통합 불러오기 (엑셀 + JSON 자동 감지) =====
function importBackup(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const ext = file.name.toLowerCase().split('.').pop();
  if(ext === 'xlsx' || ext === 'xls'){
    importBackupXLSX(file);
  }else if(ext === 'json'){
    importBackupJSON(file);
  }else{
    alert('지원하지 않는 파일 형식: .'+ext+'\n.xlsx 또는 .json 파일을 선택해주세요');
  }
  ev.target.value = '';
}

function importBackupXLSX(file){
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      // ArrayBuffer → binary string 변환 (type:'binary'에서 codepage가 제대로 적용됨)
      // EMR이 내보낸 EUC-KR .xls(텍스트형)도 이 방식이라야 한글이 안 깨짐
      const bytes = new Uint8Array(e.target.result);
      let binStr = '';
      const CHUNK = 0x8000;
      for(let i = 0; i < bytes.length; i += CHUNK){
        binStr += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
      }
      const wb = XLSX.read(binStr, {
        type:'binary',
        cellFormula:false,
        cellStyles:false,
        cellNF:false,
        cellHTML:false,
        cellText:false,
        bookVBA:false,
        bookSheets:false,
        codepage:949  // EMR이 내보낸 EUC-KR(.xls) 한글 디코딩
      });

      // 시트 자동 감지: 우리 저장본 → RBCLR → 병실현황 → 그 외
      const sheetName = wb.SheetNames.find(n=>n === '이동반 시간표')
                     || wb.SheetNames.find(n=>n.includes('수정') && n.includes('이동반'))
                     || wb.SheetNames.find(n=>n.includes('병실현황'))
                     || wb.SheetNames.find(n=>n.includes('이동반'))
                     || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = readSheetAsRows(ws);

      if(rows.length < 2){
        alert('빈 파일이거나 형식이 맞지 않아요');
        return;
      }

      // 형식 자동 감지
      let formatA_idx = -1;  // RBCLR / 저장본: '호실'+'이름' 헤더
      let formatB_idx = -1;  // 병실현황: '병실' 또는 '병동' 헤더(호실별 가로 4명)
      let formatC_idx = -1;  // EMR 명단: '수진자명'+'병실' 헤더(환자별 세로 1명)
      for(let i = 0; i < Math.min(rows.length, 20); i++){
        const r = rows[i].map(c=>String(c).trim());
        if(formatA_idx === -1 && r.includes('호실') && r.includes('이름')) formatA_idx = i;
        if(formatC_idx === -1 && r.includes('수진자명') && r.includes('병실')) formatC_idx = i;
        if(formatB_idx === -1 && (r.includes('병실') || r.includes('병동'))) formatB_idx = i;
      }

      if(formatA_idx >= 0){
        parseFormatA(rows, formatA_idx, sheetName);
      }else if(formatC_idx >= 0){
        parseFormatC(rows, formatC_idx, sheetName);
      }else if(formatB_idx >= 0){
        parseFormatB(rows, formatB_idx, sheetName);
      }else{
        alert('헤더를 찾지 못했어요.\n시트: "'+sheetName+'"\n\n지원 형식:\n• 수진자명/병실 컬럼 (EMR 명단)\n• 병실/병동 컬럼 (병실현황)\n• 호실/이름 컬럼 (저장본)');
      }
    }catch(err){
      console.error('엑셀 읽기 에러:', err);
      alert('엑셀 읽기 실패: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// 형식 A: RBCLR / 우리 저장본 — 환자별 행, 호실/이름 컬럼
function parseFormatA(rows, headerRowIdx, sheetName){
  const header = rows[headerRowIdx].map(c=>String(c).trim());
  const roomCol = header.indexOf('호실');
  const nameCol = header.indexOf('이름');

  const slotIdx = {};
  header.forEach((h,i)=>{
    if(SLOT_24H[h]) slotIdx[h] = i;
  });

  // 전체 백업이라 보고 상태 리셋 (날짜만 유지)
  const prevDate = state.date;
  initState();
  state.date = prevDate;

  let lastRoom = null;
  let pIdx = 0;
  let namesImported = 0;
  let cellsImported = 0;

  rows.slice(headerRowIdx + 1).forEach(row=>{
    const c0 = String(row[roomCol]||'').trim();
    const c1 = String(row[nameCol]||'').trim();

    if(c0 === '__meta__'){
      if(c1 === '날짜' && row[roomCol+2]) state.date = String(row[roomCol+2]||'').trim();
      return;
    }

    let room = parseInt(c0);
    if(!isNaN(room) && ALL_ROOMS.includes(room)){
      lastRoom = room;
      pIdx = 0;
    }else{
      if(!lastRoom || pIdx >= PATIENTS_PER_ROOM) return;
      room = lastRoom;
    }

    if(c1){
      state.rooms[room].patients[pIdx].name = c1;
      namesImported++;
    }

    Object.entries(slotIdx).forEach(([slot, colIdx])=>{
      const v = String(row[colIdx]||'').trim();
      if(v && CATEGORIES[v]){
        // 우리 저장본을 불러올 땐 현재 활성 요일에 적용
        // (토/일 시트가 각각 있는 새 저장본은 importBackupXLSX에서 별도 처리)
        state.rooms[room].cellsByDay[state.activeDay][makeCellKey(room, pIdx, slot)] = v;
        cellsImported++;
      }
    });

    pIdx++;
  });

  state.loadCounts.roster = namesImported;
  // 우리 저장본을 불러오면 자동 채움 카운트도 복원
  if(cellsImported > 0){
    // 형식 A는 전체 백업이므로 자동입력 카운트 초기화
    state.loadCounts.combined = 0;
  }
  saveLocal();
  render();
  updateLoadIndicators();
  updateDateDisplay();
  let msg = `환자명 ${namesImported}개 불러옴`;
  if(cellsImported > 0) msg += ` · 셀 ${cellsImported}개`;
  showStatus(msg);
  if(namesImported === 0) alert('환자명을 찾지 못했어요. 시트: "'+sheetName+'"');
}

// 형식 B: 병실현황 — 호실별 행, 환자 4명이 가로로 (이름에 '(여)79세' 같은 정보 포함)
// 환자명만 업데이트, 기존 셀 값은 그대로 둠 (4·5병동 파일을 따로 합칠 수 있게)
function parseFormatB(rows, headerRowIdx, sheetName){
  let namesImported = 0;
  const updatedRooms = new Set();
  const TAG_RE = /\((?:침상|HOLD|병동|1층|3층|외래|치료실\s*[→\->]+\s*병동|병동\s*[→\->]+\s*치료실)\)/g;

  // 어떤 행이 환자 데이터 행인지 미리 인덱싱 (호실번호 있는 행)
  const dataRows = [];
  for(let i = headerRowIdx + 1; i < rows.length; i++){
    const row = rows[i];
    for(let c = 0; c < Math.min(3, row.length); c++){
      const s = String(row[c]||'').trim();
      const m = s.match(/(\d{3})/);
      if(m){
        const r = parseInt(m[1]);
        if(ALL_ROOMS.includes(r)){ dataRows.push({rowIdx:i, room:r}); break; }
      }
    }
  }

  dataRows.forEach(({rowIdx, room}, dataIdx)=>{
    const row = rows[rowIdx];
    // 다음 환자 행까지의 사이 행들 — 거기 떠 있는 (병동)/(침상) 같은 태그를 같은 컬럼 환자에게 붙임
    const nextDataRowIdx = dataIdx + 1 < dataRows.length ? dataRows[dataIdx + 1].rowIdx : rows.length;
    const extraTagsByCol = {};  // {col: [tags...]}
    for(let i = rowIdx + 1; i < nextDataRowIdx; i++){
      const r2 = rows[i];
      for(let c = 0; c < r2.length; c++){
        const v = String(r2[c]||'').trim();
        if(!v) continue;
        const tagsHere = v.match(TAG_RE);
        if(tagsHere){
          if(!extraTagsByCol[c]) extraTagsByCol[c] = [];
          extraTagsByCol[c].push(...tagsHere);
        }
      }
    }

    // 환자명 추출: 한 행에 가로로 4명 ('김명심(여)79세' 형식)
    let pIdx = 0;
    for(let c = 0; c < row.length && pIdx < PATIENTS_PER_ROOM; c++){
      const val = String(row[c]||'').trim();
      if(!val) continue;
      // 호실번호 자체 또는 병동 이름은 건너뜀
      if(val.match(/^\d{3}호?$/) || val.match(/^[45]병동$/) || val === '병동' || val === '병실') continue;
      // 앞부분 한글 이름 + (선택) 동명이인 번호 추출
      //   예) "이종례2(여)85세" → 이름 "이종례", 번호 "2" → 저장 "이종례2"
      //   번호는 반드시 보존해야 함. 안 그러면 치료시트의 'H이종례2'와 매칭할 때
      //   '명단엔 번호 없는 이종례 1명만 있음 → 외래 의심'으로 잘못 경고가 뜸.
      const m = val.match(/^([가-힣]+)(\d)?/);
      if(m && m[1].length >= 2){
        const suffix = m[2] || '';
        let fullName = m[1] + suffix;
        // 셀 내부에 있는 태그 보존: (침상)/(HOLD)/(병동)/(1층)/(3층)/(외래)/(치료실→병동)/(병동→치료실)
        const rest = val.slice(m[1].length + suffix.length);
        const tagsInCell = rest.match(TAG_RE);
        if(tagsInCell) fullName += tagsInCell.join('');
        // 같은 컬럼 아래 행에 있는 태그도 추가
        if(extraTagsByCol[c]){
          fullName += extraTagsByCol[c].join('');
        }
        console.log(`[병실현황 import] ${room}호 p${pIdx}: 원본="${val.replace(/\n/g,'⏎')}" 아래태그=${JSON.stringify(extraTagsByCol[c]||[])} 저장="${fullName}"`);
        state.rooms[room].patients[pIdx].name = fullName;
        namesImported++;
        pIdx++;
      }
    }

    // 환자 수 부족하면 나머지 슬롯 비우기 (예: 408호는 3명)
    for(let p = pIdx; p < PATIENTS_PER_ROOM; p++){
      state.rooms[room].patients[p].name = '';
    }

    updatedRooms.add(room);
  });

  // 누적 카운트 (4병실현황 + 5병실현황 합쳐서)
  state.loadCounts.roster = countLoadedNames();
  saveLocal();
  render();
  updateLoadIndicators();
  const wards = new Set();
  updatedRooms.forEach(r=>wards.add(r < 500 ? '4병동' : '5병동'));
  const wardTxt = [...wards].join('·');
  showStatus(`병실현황 불러옴: ${namesImported}명 (${updatedRooms.size}개 호실, ${wardTxt})`);
}

// 형식 C: EMR 명단 — 환자별 세로 1행, '수진자명'+'병실' 컬럼
// 병실 컬럼으로 호실을 정하고, 같은 호실 환자를 순서대로 4명까지 채움
function parseFormatC(rows, headerRowIdx, sheetName){
  const header = rows[headerRowIdx].map(c=>String(c).trim());
  const nameCol = header.indexOf('수진자명');
  const roomCol = header.indexOf('병실');

  // 호실별로 환자명 수집
  const byRoom = {};  // {room: [name, ...]}
  for(let i = headerRowIdx + 1; i < rows.length; i++){
    const row = rows[i];
    const rawRoom = String(row[roomCol]||'').trim();
    const rawName = String(row[nameCol]||'').trim();
    if(!rawName) continue;
    const rm = rawRoom.match(/(\d{3})/);
    if(!rm) continue;
    const room = parseInt(rm[1]);
    if(!ALL_ROOMS.includes(room)) continue;
    const nm = (rawName.match(/^([가-힣]+)/)||[])[1];
    if(!nm || nm.length < 2) continue;
    (byRoom[room] = byRoom[room] || []).push(nm);
  }

  // 호실별로 최대 4명 배치 (해당 병동 파일이면 그 병동 호실만 갱신됨)
  let namesImported = 0;
  const updatedRooms = new Set();
  Object.entries(byRoom).forEach(([roomStr, names])=>{
    const room = parseInt(roomStr);
    for(let p = 0; p < PATIENTS_PER_ROOM; p++){
      state.rooms[room].patients[p].name = (p < names.length) ? names[p] : '';
    }
    if(names.length > PATIENTS_PER_ROOM){
      console.warn(`[EMR명단] ${room}호 환자 ${names.length}명 — 4명 초과분 표시 안 됨:`, names.slice(PATIENTS_PER_ROOM));
    }
    namesImported += Math.min(names.length, PATIENTS_PER_ROOM);
    updatedRooms.add(room);
  });

  state.loadCounts.roster = countLoadedNames();
  saveLocal();
  render();
  updateLoadIndicators();
  const wards = new Set();
  updatedRooms.forEach(r=>wards.add(r < 500 ? '4병동' : '5병동'));
  showStatus(`EMR 명단 불러옴: ${namesImported}명 (${updatedRooms.size}개 호실, ${[...wards].join('·')})`);
}

// 현재 명단에 입력된 환자 총수 계산
function countLoadedNames(){
  let n = 0;
  ALL_ROOMS.forEach(r=>{
    state.rooms[r].patients.forEach(p=>{
      if(p.name && p.name.trim()) n++;
    });
  });
  return n;
}

function importBackupJSON(file){
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const parsed = JSON.parse(e.target.result);
      const data = parsed.rooms ? parsed : (parsed.state || parsed);
      initState();
      if(data.rooms){
        ALL_ROOMS.forEach(r=>{
          if(data.rooms[r]){
            if(Array.isArray(data.rooms[r].patients)){
              for(let p=0;p<PATIENTS_PER_ROOM;p++){
                if(data.rooms[r].patients[p]){
                  state.rooms[r].patients[p] = data.rooms[r].patients[p];
                }
              }
            }
            // 새 구조 (cellsByDay)
            if(data.rooms[r].cellsByDay){
              DAYS.forEach(d=>{
                if(data.rooms[r].cellsByDay[d]){
                  state.rooms[r].cellsByDay[d] = {...data.rooms[r].cellsByDay[d]};
                }
              });
            }
            // 구 cells 구조 → 토요일로 마이그
            else if(data.rooms[r].cells){
              state.rooms[r].cellsByDay[syncDays()[0]] = {...data.rooms[r].cells};
            }
          }
        });
      }
      state.date = data.date || '';
      state.activeDay = data.activeDay || '토';
      saveLocal();
      render();
      setActiveDay(state.activeDay);
      updateDateDisplay();
      showStatus('JSON 불러오기 완료');
    }catch(err){
      alert('JSON 읽기 실패: '+err.message);
    }
  };
  reader.readAsText(file);
}

// ===== JSON (호환용, 숨김) =====
function exportJSON(){
  const data = JSON.stringify({version:3, exported:new Date().toISOString(), ...state}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = state.date || new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `이동반_시간표_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showStatus('JSON 저장 완료');
}

function importJSON(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const parsed = JSON.parse(e.target.result);
      const data = parsed.rooms ? parsed : (parsed.state || parsed);
      initState();
      if(data.rooms){
        ALL_ROOMS.forEach(r=>{
          if(data.rooms[r]){
            if(Array.isArray(data.rooms[r].patients)){
              for(let p=0;p<PATIENTS_PER_ROOM;p++){
                if(data.rooms[r].patients[p]){
                  state.rooms[r].patients[p] = data.rooms[r].patients[p];
                }
              }
            }
            if(data.rooms[r].cells){
              state.rooms[r].cells = {...data.rooms[r].cells};
            }
          }
        });
      }
      state.date = data.date || '';
      saveLocal();
      render();
      updateDateDisplay();
      showStatus('JSON 불러오기 완료');
    }catch(err){
      alert('파일 읽기 실패: '+err.message);
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

// ===== 일일업무보고 자동 채우기 =====
// SheetJS sheet_to_json 우회 — 수식 셀에서 죽는 버그 회피
function readSheetAsRows(ws){
  const rows = [];
  if(!ws || !ws['!ref']) return rows;
  const range = XLSX.utils.decode_range(ws['!ref']);
  for(let r = range.s.r; r <= range.e.r; r++){
    const row = [];
    for(let c = range.s.c; c <= range.e.c; c++){
      const ref = XLSX.utils.encode_cell({r, c});
      const cell = ws[ref];
      if(!cell){ row.push(''); continue; }
      // 수식셀이든 일반셀이든 .v(값)만 가져옴
      row.push(cell.v != null ? cell.v : '');
    }
    rows.push(row);
  }
  return rows;
}

// 여러 시트 중 사용자 날짜에 맞거나 데이터가 가장 많은 시트 선택
function pickBestSheet(wb, targetDate){
  // 1) 날짜 기반 매칭: '06_02', '06.02', '6_2', '06_02화요일...' 등
  if(targetDate){
    const [y, m, d] = targetDate.split('-').map(Number);
    const mPad = String(m).padStart(2,'0');
    const dPad = String(d).padStart(2,'0');
    const patterns = [
      `${mPad}_${dPad}`, `${mPad}.${dPad}`,
      `${m}_${d}`, `${m}.${d}`,
      `${mPad}_${d}`, `${m}_${dPad}`,
      `${mPad}.${d}`, `${m}.${dPad}`
    ];
    for(const sn of wb.SheetNames){
      for(const p of patterns){
        // 시트명이 패턴으로 시작하거나 포함하면 매칭
        if(sn.startsWith(p) || sn.includes('_'+p) || sn.includes(' '+p)){
          return sn;
        }
      }
    }
  }

  // 2) 한글 셀이 가장 많은 시트 (가장 채워진 시트)
  let best = null, max = 0;
  for(const name of wb.SheetNames){
    const ws = wb.Sheets[name];
    if(!ws['!ref']) continue;
    let count = 0;
    const range = XLSX.utils.decode_range(ws['!ref']);
    const maxR = Math.min(range.s.r + 50, range.e.r);
    const maxC = Math.min(range.s.c + 25, range.e.c);
    for(let r = range.s.r; r <= maxR; r++){
      for(let c = range.s.c; c <= maxC; c++){
        const cell = ws[XLSX.utils.encode_cell({r,c})];
        if(cell && cell.v && /[가-힣]/.test(String(cell.v))) count++;
      }
    }
    if(count > max){ max = count; best = name; }
  }
  return best || wb.SheetNames[0];
}
