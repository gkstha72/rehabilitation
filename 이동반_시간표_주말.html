// 헤더 날짜 표시 갱신 — state.date가 무엇이든 토요일·일요일로 보정해 표시
function updateDateDisplay(){
  const el = document.getElementById('date-display');
  if(!el) return;
  syncDays();
  const list = (state.dayList && state.dayList.length) ? state.dayList : [];
  const label = list.length
    ? `📅 ${list.map(d=>{
        const dd = Number(d.date.split('-')[2]);
        const mm = Number(d.date.split('-')[1]);
        return `${mm}/${dd}(${d.key})`;
      }).join(' · ')}`
    : (state.date ? `📅 ${formatDateKorean(state.date)}` : '📅 날짜 선택');
  el.classList.toggle('has-date', !!(list.length || state.date));
  const start = list.length ? list[0].date : (state.date || '');
  const count = list.length || 2;
  el.innerHTML =
    `<span class="date-pick" title="시작일을 고르고 일수를 선택하세요">`+
      `<span class="dp-label${(list.length||state.date)?'':' empty'}">${label}</span>`+
      `<input type="date" id="date-picker" value="${start}" onchange="onWeekendStartPicked(this.value)" title="시작일">`+
      `<select id="day-count" onchange="onDayCountPicked(this.value)" title="며칠짜리 주말인지 선택">`+
        [2,3,4,5].map(n=>`<option value="${n}"${n===count?' selected':''}>${n}일</option>`).join('')+
      `</select>`+
      ((list.length||state.date) ? `<button class="dp-clear" title="날짜 지우기" onclick="onWeekendStartPicked('')">✕</button>` : '')+
    `</span>`;
  const lbl = el.querySelector('.dp-label');
  const inp = el.querySelector('#date-picker');
  if(lbl && inp){
    lbl.onclick = ()=>{ if(inp.showPicker){ try{ inp.showPicker(); }catch(e){ inp.focus(); } } else inp.focus(); };
  }
}

// 시작일을 달력에서 고름 — 현재 일수만큼 dayList 재구성
function onWeekendStartPicked(v){
  if(!v){
    state.date = ''; state.dayList = [];
    syncDays(); reconcileDayMaps();
    saveLocal(); renderDayButtons(); updateDateDisplay(); render();
    showStatus('날짜를 지웠습니다');
    return;
  }
  if(!/^\d{4}-\d{2}-\d{2}$/.test(v)) return;
  const count = (state.dayList && state.dayList.length) ? state.dayList.length : 2;
  applyDayList(buildDayList(v, count), '기준 날짜');
}
// 일수(2~5일) 선택 — 공휴일이 껴서 3일 이상인 주말 대응
function onDayCountPicked(n){
  const count = Math.max(1, Math.min(5, Number(n)||2));
  const start = (state.dayList && state.dayList.length) ? state.dayList[0].date : state.date;
  if(!start){
    showStatus('먼저 시작일을 선택해주세요');
    updateDateDisplay();
    return;
  }
  applyDayList(buildDayList(start, count), '기간');
}
// dayList 적용 (셀 데이터는 요일 키 기준으로 최대한 보존)
function applyDayList(list, what){
  state.dayList = list;
  state.date = list.length ? list[0].date : '';
  syncDays();
  reconcileDayMaps();
  saveLocal();
  renderDayButtons();
  updateDateDisplay();
  render();
  if(what){
    showStatus(`${what} 설정: ${list.map(d=>`${Number(d.date.split('-')[2])}일(${d.key})`).join(' · ')}`);
  }
}

const SLOT_24H = {
  "09:00":[9,0], "09:35":[9,35], "10:10":[10,10],
  "10:45":[10,45], "11:20":[11,20], "11:55":[11,55],
  "01:30":[13,30], "02:05":[14,5], "02:40":[14,40],
  "03:15":[15,15], "03:50":[15,50], "04:25":[16,25],
  "05:00":[17,0]
};

function matchToSlot(h, m){
  // 엑셀이 오후 시간을 12시간제로 저장하는 경우 처리:
  //   1:30 PM = 0.0625 → h=1 인데 [13,30]에 매칭되어야 함
  //   5:00 PM = 0.208333 → h=5 인데 [17,0]에 매칭되어야 함
  // 그래서 1~6시는 13~18시로도 시도
  const hCandidates = [h];
  if(h >= 1 && h <= 6) hCandidates.push(h + 12);

  for(const [label, [sh, sm]] of Object.entries(SLOT_24H)){
    for(const hVar of hCandidates){
      if(sh === hVar && Math.abs(sm - m) <= 3) return label;
    }
  }
  return null;
}

function parseTimeValue(rawVal, formattedVal){
  if(rawVal == null && formattedVal == null) return null;
  // formattedVal가 'HH:MM:SS' 같은 시간 문자열
  const s = String(formattedVal != null ? formattedVal : rawVal);
  const m1 = s.match(/^(\d{1,2}):(\d{2})/);
  if(m1){
    return matchToSlot(parseInt(m1[1]), parseInt(m1[2]));
  }
  // 엑셀 시리얼 시간 (0.375 = 09:00)
  const n = parseFloat(rawVal);
  if(!isNaN(n) && n > 0 && n < 1){
    const totalMin = Math.round(n * 24 * 60);
    return matchToSlot(Math.floor(totalMin / 60), totalMin % 60);
  }
  return null;
}

// 이름 뒤에 붙는 치료 설명 접미사 — 정규식이 이름과 붙여서 캡처하는 걸 벗겨냄
//   예: "정재희평가" → "정재희"(명단 매칭) + "평가"(치료 설명, 무시)
//   원본 시트에서 자주 이름과 붙여서 쓰이는 단어들만 넣음. (긴 접미사부터 우선 매칭)
//   ※ 매칭은 접미사를 뗀 이름이 실제 명단에 있을 때만 적용 → 짧게 잘라내는 오작동은 안 남.
const TRAILING_SUFFIXES = [
  '음악치료실','음악치료','인지치료','언어치료','연하치료','호흡치료','호흡훈련',
  '도수중재','열전기치료','전기자극','상지운동','하지운동','안면운동',
  '상지압박','하지압박','상지','체외','견인','평가'
];
// 안전: 위 순서를 길이 내림차순으로 정렬 (긴 접미사가 짧은 것보다 먼저 매칭되도록)
TRAILING_SUFFIXES.sort((a,b) => b.length - a.length);

// 한 셀에서 환자 정보 추출 (이름 + 카테고리 오버라이드 + 제외 여부)
// 반환: [{name, override, exclude}, ...]
//
// 처리 원칙: **줄 단위 스코프** (평일 버전과 동일)
//   같은 셀이라도 줄(\n)이 다르면 다른 환자로 간주, 태그가 줄을 넘어 다른 이름에 섞이지 않게 함.
//   예: "G방극열+패시브\nH정금복+슬라\n\nC조민경+리포머(외래)"
//       → (외래) 태그는 조민경 줄에만 적용. 방극열·정금복은 영향 없음.
//   주말 카테고리는 1층/3층/통증만 유효. (외래)·(병동)은 자동입력에서 제외
//     - (외래): 사용자가 셀 클릭으로 직접 표시
//     - (병동): 주말 카테고리가 아니므로 자동입력 대상 아님
function extractPatientNames(content, nameMap){
  if(!content) return [];
  const text = String(content);
  const results = [];
  const hasRoster = nameMap && Object.keys(nameMap).length > 0;
  const isRealName = (n) => hasRoster ? !!(nameMap[n] && nameMap[n].length > 0) : true;

  const lines = text.split(/\r?\n/);
  const namePattern = /([A-Z]+\d?)?([가-힣]{2,})(\d)?(?:\s*(\([^)]+\)))?/g;

  // 1) 줄별로 이름·태그 추출
  const perLine = lines.map(line => {
    // 줄 전체에서 카테고리 태그 감지
    // (외래)·(병동)은 자동입력 제외 (외래는 직접 기입, 병동은 주말 카테고리 아님)
    let lineOverride = null;
    let lineExclude = false;
    if(/\(침상\)|\(HOLD\)|\(외래\)|\(병동\)/i.test(line)){ lineExclude = true; }
    else if(/\(치료실\s*[→\->]+\s*병동\)/.test(line)){ lineOverride = '3층'; }
    else if(/\(1층\)/.test(line)){ lineOverride = '1층'; }
    else if(/\(3층\)/.test(line)){ lineOverride = '3층'; }
    else if(/\(통증\)/.test(line)){ lineOverride = '통증'; }
    else if(/\(음악치료실\)/.test(line)){ lineOverride = '1층'; }   // 음악치료실은 1층에 위치

    // 줄 안의 이름 추출
    const names = [];
    namePattern.lastIndex = 0;
    let m;
    while((m = namePattern.exec(line)) !== null){
      let name = m[2];
      const numAfter = m[3] || '';
      const tag = m[4] || '';

      // 동명이인 번호 판정 — 이 시점 name은 아직 원본(정규식 캡처) 그대로, name.length 그대로 사용
      let homonymNum = null;
      if(numAfter){
        const rightAfterNum = line[m.index + (m[1]?m[1].length:0) + name.length + 1] || '';
        if(!/[:분층호]/.test(rightAfterNum)){
          homonymNum = numAfter;
        }
      }

      // 이름 바로 뒤에 붙은 태그 (가장 강함, 줄 태그보다 우선)
      let override = null;
      let exclude = false;
      if(tag){
        if(/침상|HOLD|^\(외래\)$|^\(병동\)$/i.test(tag)){ exclude = true; }
        else if(/치료실\s*[→\->]+\s*병동/.test(tag)){ override = '3층'; }
        else if(/^\(1층\)$/.test(tag)){ override = '1층'; }
        else if(/^\(3층\)$/.test(tag)){ override = '3층'; }
        else if(/^\(통증\)$/.test(tag)){ override = '통증'; }
        else if(/^\(음악치료실\)$/.test(tag)){ override = '1층'; }   // 음악치료실은 1층에 위치
        // 그 외 (평가)(인지치료)(체외)(상지운동) 등 치료 정보는 무시
      }

      // 이름 뒤에 붙은 치료 설명(평가/음악치료실 등)을 벗겨내고 명단 재확인
      //   예: "정재희평가" → 명단X → "평가" 뗀 "정재희"가 명단O → "정재희" 사용, "평가"는 치료설명(무시)
      //   ※ 접미사 뗀 이름이 실제 명단에 있을 때만 적용 → 다른 케이스에는 영향 없음.
      //   ※ 다음 줄에 "(3층)" 같은 태그가 있으면, 짧아진 진짜 이름 덕분에 부속 태그 규칙(step 2)이 적용됨.
      if(hasRoster && !(nameMap[name] && nameMap[name].length > 0)){
        for(const suf of TRAILING_SUFFIXES){
          if(name.length > suf.length && name.endsWith(suf)){
            const trimmed = name.slice(0, name.length - suf.length);
            if(trimmed.length >= 2 && nameMap[trimmed] && nameMap[trimmed].length > 0){
              name = trimmed;
              break;
            }
          }
        }
      }

      const real = isRealName(name);
      names.push({name, override, exclude, homonymNum, real});
    }
    return {line, names, lineOverride, lineExclude};
  });

  // 2) 부속 태그 줄(환자 이름이 없고 카테고리 태그만 있는 줄)은 직전 이름 줄에 적용
  //    예: "H박철호\n(상지운동) (3층)" → (3층)이 박철호에 붙음
  //    단, "C조민경+리포머(외래)" 처럼 prefix+한글 이름이 있는 줄은 부속 줄 아님
  const PATIENT_TOKEN = /(?:[A-Z]+\d?|\d+)\s*[가-힣]{2,}/;
  perLine.forEach((cur, idx) => {
    if(!(cur.lineOverride || cur.lineExclude)) return;
    if(cur.names.some(n => n.real)) return;
    if(PATIENT_TOKEN.test(cur.line)) return;
    for(let j = idx - 1; j >= 0; j--){
      const realNames = perLine[j].names.filter(n => n.real);
      if(realNames.length > 0){
        realNames.forEach(n => {
          if(!n.override && !n.exclude){
            if(cur.lineOverride) n.override = cur.lineOverride;
            if(cur.lineExclude) n.exclude = true;
          }
        });
        break;
      }
    }
  });

  // 3) 같은 줄에 진짜 이름 정확히 1명 + 줄 태그가 있으면 그 이름에 적용
  perLine.forEach(cur => {
    const realNames = cur.names.filter(n => n.real);
    if(realNames.length === 1 && (cur.lineOverride || cur.lineExclude)){
      const n = realNames[0];
      if(!n.override && !n.exclude){
        if(cur.lineOverride) n.override = cur.lineOverride;
        if(cur.lineExclude) n.exclude = true;
      }
    }
  });

  // 3.5) 셀 단위 라벨 — 괄호 없는 "3층기구"/"1층기구" 줄이 단독으로 있으면
  //      그 셀 전체 환자에 적용. 환자별 override가 이미 설정된 환자는 그대로(개별 우선).
  //      예: "H박영정+어댑핏\nH김순복+전상\n...\n3층기구" → 셀의 모든 환자 → 3층
  //      "(3층)" 같은 괄호 태그는 직전 환자에만 적용되는 기존 부속 줄 로직(2) 그대로.
  const CELL_LABEL_RE = /^\s*([13]층)\s*기구\s*$/;
  let cellOverride = null;
  for(const cur of perLine){
    const m = cur.line.trim().match(CELL_LABEL_RE);
    if(m){
      cellOverride = m[1];  // '3층' 또는 '1층'
      break;
    }
  }
  if(cellOverride){
    perLine.forEach(cur=>{
      cur.names.forEach(n=>{
        if(n.real && !n.override && !n.exclude){
          n.override = cellOverride;
        }
      });
    });
  }

  // 4) 평탄화 + 로그
  perLine.forEach(cur => {
    cur.names.forEach(n => {
      if(n.real || cur.lineOverride || cur.lineExclude){
        console.log(`[extract] 원본셀="${text.replace(/\n/g,'⏎').replace(/\r/g,'␍').slice(0,80)}" 줄="${cur.line.slice(0,40)}" → 이름="${n.name}" 줄태그="${cur.lineOverride||(cur.lineExclude?'제외':'-')}" 명단="${n.real?'O':'X'}" → override="${n.override||'-'}" exclude=${n.exclude}`);
      }
      results.push({name:n.name, override:n.override, exclude:n.exclude, homonymNum:n.homonymNum});
    });
  });

  return results;
}

function buildNameMap(){
  const map = {};
  ALL_ROOMS.forEach(r=>{
    state.rooms[r].patients.forEach((pt, p)=>{
      const info = nameTagInfo(pt.name);
      if(info.excluded) return;
      // 1) 괄호 태그 제거: 김명심(1층) → 김명심
      const cleaned = info.display.replace(/\s*\([^)]+\)/g, '').trim();
      // 2) 순수 한글 이름 + (선택) 동명이인 번호 분리
      //    예) '이종례2' → baseName='이종례', num='2'
      //        '김명심'  → baseName='김명심', num=null
      //    번호 정보를 보존해야 치료시트의 'H이종례2'와 정확히 매칭됨.
      const m = cleaned.match(/([가-힣]+)(\d)?/);
      const baseName = m ? m[1] : cleaned;
      const num = (m && m[2]) ? m[2] : null;
      if(baseName && baseName.length >= 2){
        if(!map[baseName]) map[baseName] = [];
        map[baseName].push({room:r, p, tag:info.tag, num});
      }
    });
  });
  return map;
}

// 워크북 내부 원본 파일을 문자열로 읽기
function wbFileText(wb, path){
  const f = wb.files && wb.files[path];
  if(!f) return null;
  if(typeof f === 'string') return f;
  if(f.content){
    try{
      // content가 Uint8Array/배열인 경우 UTF-8 디코드
      return new TextDecoder('utf-8').decode(new Uint8Array(f.content));
    }catch(e){
      try{ return String.fromCharCode.apply(null, f.content); }catch(e2){ return null; }
    }
  }
  return null;
}

// 밑줄 서식이 적용된 셀들의 ref 집합 (액팅/완료 처리 → 이동반 제외)
// 취소선(strike)은 대상이 아님: 이름 위 선 그어진 환자도 자동입력 대상.
//   (예) 셀에 "(F)M정정임+슬라(GJ003)\nH김양수+리포머" 가 있고 첫 줄만 취소선 →
//        정정임·김양수 둘 다 자동입력에 잡혀야 함. 밑줄만 제외 신호.
function buildUnderlineSet(wb, sheetName){
  const set = new Set();
  try{
    const styles = wbFileText(wb, 'xl/styles.xml');
    if(!styles) return set;

    // 폰트별 밑줄 여부 (취소선은 제외 신호 아님)
    const fontsBlock = (styles.match(/<fonts[^>]*>([\s\S]*?)<\/fonts>/)||[])[1] || '';
    const fonts = fontsBlock.match(/<font>[\s\S]*?<\/font>|<font\/>/g) || [];
    const fontExclude = fonts.map(f => /<u\/>|<u /.test(f));

    // 셀 스타일(cellXfs) 인덱스 → 제외 여부
    const xfsBlock = (styles.match(/<cellXfs[^>]*>([\s\S]*?)<\/cellXfs>/)||[])[1] || '';
    const xfs = xfsBlock.match(/<xf [^>]*\/>|<xf [^>]*>[\s\S]*?<\/xf>/g) || [];
    const styleUnderline = xfs.map(xf => {
      const m = xf.match(/fontId="(\d+)"/);
      const fid = m ? parseInt(m[1]) : 0;
      return !!fontExclude[fid];
    });

    // 시트 이름 → 워크시트 XML 경로
    const wbXml = wbFileText(wb, 'xl/workbook.xml') || '';
    const rels = wbFileText(wb, 'xl/_rels/workbook.xml.rels') || '';
    const esc = sheetName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const sheetTag = (wbXml.match(new RegExp('<sheet [^>]*name="'+esc+'"[^>]*>'))||[])[0] || '';
    const ridM = sheetTag.match(/r:id="([^"]+)"/);
    let sheetPath = null;
    if(ridM){
      const relM = rels.match(new RegExp('Id="'+ridM[1]+'"[^>]*Target="([^"]+)"'));
      if(relM) sheetPath = 'xl/' + relM[1].replace(/^\//,'');
    }
    if(!sheetPath) return set;

    // 워크시트 XML에서 셀ref + 스타일인덱스 → 밑줄이면 추가
    const sheetXml = wbFileText(wb, sheetPath) || '';
    const cellRe = /<c r="([A-Z]+\d+)"(?:[^>]*?\ss="(\d+)")?[^>]*>/g;
    let m;
    while((m = cellRe.exec(sheetXml)) !== null){
      const sIdx = m[2] ? parseInt(m[2]) : 0;
      if(styleUnderline[sIdx]) set.add(m[1]);
    }
  }catch(e){
    console.warn('밑줄 감지 실패:', e);
  }
  return set;
}

// 컬럼 헤더 분류: CPM→1층, 시행(3층)→3층, 외래/재택→제외
// 환자 셀의 (3층) 태그 등을 오인하지 않도록 정확한 헤더 패턴만 인식
function classifyColHeader(text){
  const t = String(text).trim();
  if(t === '외래' || t === '재택/방문' || t === '재택교육' || /^재택/.test(t)) return {exclude:true};
  if(/^CPM\b/i.test(t) || t.toUpperCase() === 'CPM') return {cat:'1층'};
  if(/시행\s*\(?\s*3층\s*\)?/.test(t)) return {cat:'3층'};
  return null;
}
// 컬럼별 카테고리 헤더 목록 수집: {c: [{row, cat?, exclude?}]}
// 머지된 헤더 셀(예: Q38:S38='CPM')은 SheetJS에서 좌상단(Q38)에만 값이 저장되고
// 오른쪽 셀(R38,S38)은 빈 셀로 나옴 → 머지 범위 전체 컬럼에 헤더를 등록해야
// '다리(누워서)','다리(앉아서)' 같은 CPM 하위 컬럼도 1층으로 분류됨.
function buildColHeaders(ws, range){
  const colHeaders = {};
  // 머지 좌상단 좌표 → 머지 범위 인덱스
  const merges = ws['!merges'] || [];
  const mergeByTopLeft = {};
  for(const m of merges){
    const key = XLSX.utils.encode_cell({r: m.s.r, c: m.s.c});
    mergeByTopLeft[key] = m;
  }
  for(let c = range.s.c; c <= range.e.c; c++){
    for(let r = range.s.r; r <= range.e.r; r++){
      const ref = XLSX.utils.encode_cell({r, c});
      const cell = ws[ref];
      if(!cell || typeof cell.v !== 'string') continue;
      const cls = classifyColHeader(cell.v);
      if(cls){
        // 머지된 헤더면 머지 범위 전체 컬럼에 등록 (예: Q38:S38 CPM → Q,R,S 모두 1층)
        const mg = mergeByTopLeft[ref];
        const cStart = mg ? mg.s.c : c;
        const cEnd   = mg ? mg.e.c : c;
        for(let cc = cStart; cc <= cEnd; cc++){
          if(!colHeaders[cc]) colHeaders[cc] = [];
          colHeaders[cc].push({row:r, ...cls});
        }
      }
    }
  }
  return colHeaders;
}
// (r,c)에 적용되는 컬럼 오버라이드 = 같은 컬럼에서 가장 가까운 위쪽 헤더
function getColOverride(colHeaders, r, c){
  const list = colHeaders[c];
  if(!list) return null;
  let best = null;
  for(const h of list){ if(h.row <= r && (!best || h.row > best.row)) best = h; }
  return best;
}

// 엑셀 상단(보통 A1)에서 'YYYY년 MM월 DD일' 날짜를 추출 → 'YYYY-MM-DD'
function extractSheetDate(ws, range){
  const maxR = Math.min(range.s.r + 6, range.e.r);
  const maxC = Math.min(range.s.c + 8, range.e.c);
  // 연도 옵션: '2026년 6월 14일' 또는 '6월 14일'(연도 없으면 올해)
  const RX = /(?:(\d{4})\s*년\s*)?(\d{1,2})\s*월\s*(\d{1,2})\s*일/;
  for(let r = range.s.r; r <= maxR; r++){
    for(let c = range.s.c; c <= maxC; c++){
      const cell = ws[XLSX.utils.encode_cell({r, c})];
      if(!cell || typeof cell.v !== 'string') continue;
      const m = cell.v.match(RX);
      if(m){
        const y  = m[1] ? m[1] : String(new Date().getFullYear());
        const mo = String(m[2]).padStart(2,'0');
        const d  = String(m[3]).padStart(2,'0');
        return `${y}-${mo}-${d}`;
      }
    }
  }
  return null;
}

// 프로그램 날짜와 엑셀 날짜 비교. 불일치 시 계속할지 확인.
// 반환: true = 진행, false = 취소
function verifySheetDate(ws, range, fileLabel){
  const sheetDate = extractSheetDate(ws, range);
  const appDate = state.date;
  if(!appDate) return true;
  if(!sheetDate){
    console.warn(`[날짜검증] ${fileLabel}: 엑셀 상단에서 날짜를 찾지 못함`);
    return true;
  }
  if(sheetDate !== appDate){
    const fmt = s => { const [y,mo,d]=s.split('-'); return `${y}년 ${mo}월 ${d}일`; };
    return confirm(
      `⚠️ 날짜가 일치하지 않습니다!\n\n`+
      `• 프로그램 설정 날짜: ${fmt(appDate)}\n`+
      `• ${fileLabel} 파일 날짜: ${fmt(sheetDate)}\n\n`+
      `다른 날짜의 파일일 수 있습니다. 그래도 자동입력을 진행할까요?\n`+
      `(취소하고 올바른 파일/날짜를 확인하는 것을 권장합니다)`
    );
  }
  return true;
}

// ===== 검증 기능 (주말) =====
// 원본에 자주 나오는 장비·치료·태그 단어 (환자명이 아님 → 미매칭 목록 제외)
const EQUIP_WORDS = new Set([
  '슬라','런닝','코로','코','워킹','아크','경사','바로','동적','기립','체어','리포머','캐딜락',
  '전기','안면전기','전기펜','전기장갑','전동상지','어댑핏','클라','오토','패시브','스마트','하네스',
  '엔젤','엑소','엘봇','알봇','로봇','필라테스','진동기','등속성','저속','한발로','호흡치료','호흡훈련',
  '외래','화목','병동','치료실','침상','재택','방문','도수중재','인지치료','음악치료','음악치료실',
  '연하치료','식이치료','상지운동','상지압박','하지압박','상지','안면운동','체외','크라이오','견인',
  '스트레칭','필수','최대한','평가','재활센터','시간표','점심시간','토요일','일요일','주말시간표',
  '월요일','화요일','수요일','목요일','금요일','근골격계','신경계','전기자극','열전기치료','도수',
  'sono','SSP','ICT','HP','IR','BI','MI','CLT','FES','taVNS','TDCS','GJ','SN','EST','complex'
]);

// 시트에 특정 섹션 헤더(PT/OT/전기 등)가 존재하는지 확인.
//   주말 파일은 요일마다 레이아웃이 다를 수 있어 3가지 방식으로 검사.
//   ① A열(첫 컬럼) 셀 시작이 keyword인 경우 — 뒤에 공백/괄호/숫자/끝만 허용
//     (예: "전기", "전기(14)"는 매칭 / "전기자극"은 매칭 안 됨)
//   ② 라벨 행 검사 — 같은 행에 SECTION_LABEL 라벨 2개 이상 나란히 있고, 그 중 하나가 keyword
//     (예: OT/로봇OT/ST가 같은 행에 붙어 있는 헤더 행에서 OT를 찾음)
//   ③ 서브테이블 검사 — 셀에 keyword가 포함되고 인접 컬럼에 자리번호(1,2,3,...)가 연속으로 이어짐
//     (주말의 "전기(14)" 같은 서브테이블 헤더 감지용 — processSheetForDay의 검출 로직과 동일)
function hasSectionHeader(ws, range, keyword){
  const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const kwRe = new RegExp('^' + escaped + '(?:\\s|$|\\(|[0-9])', 'i');
  const KNOWN_LABELS_RE = /^(NDT|OT|PT|ST|MAT|FES|GAIT|RAT|로봇\s*OT|로봇|매트|회복기|통증|언어|스피치|speech|전기)(?:\s|$|\(|[0-9])/i;

  // ① A열
  for(let r = range.s.r; r <= range.e.r; r++){
    const cell = ws[XLSX.utils.encode_cell({r, c: range.s.c})];
    if(!cell || typeof cell.v !== 'string') continue;
    if(kwRe.test(cell.v.trim())) return true;
  }
  // ② 라벨 행
  for(let r = range.s.r; r <= range.e.r; r++){
    let hasKeyword = false, labelCount = 0;
    for(let c = range.s.c + 1; c <= range.e.c; c++){
      const cell = ws[XLSX.utils.encode_cell({r, c})];
      if(!cell || typeof cell.v !== 'string') continue;
      const v = cell.v.trim();
      if(!v) continue;
      if(KNOWN_LABELS_RE.test(v)) labelCount++;
      if(kwRe.test(v)) hasKeyword = true;
    }
    if(hasKeyword && labelCount >= 2) return true;
  }
  // ③ 서브테이블 (셀에 keyword + 인접 컬럼에 자리번호 연속)
  const contentRe = new RegExp(escaped);
  for(let r = range.s.r; r <= range.e.r; r++){
    for(let c = range.s.c; c <= range.e.c; c++){
      const cell = ws[XLSX.utils.encode_cell({r, c})];
      if(!cell || typeof cell.v !== 'string') continue;
      const trimmed = cell.v.trim();
      if(!contentRe.test(trimmed)) continue;
      // 자리번호 1부터 연속으로 나오는지 검사
      let expectSeat = 1, seatFound = 0;
      for(let cc = c + 1; cc <= range.e.c; cc++){
        const sc = ws[XLSX.utils.encode_cell({r, c: cc})];
        if(sc && typeof sc.v === 'number' && Number.isInteger(sc.v) && sc.v === expectSeat){
          seatFound++;
          expectSeat++;
        }else if(sc && sc.v != null && sc.v !== ''){
          break;
        }else if(seatFound > 0){
          break;
        }
      }
      if(seatFound >= 2) return true;   // 자리번호 2개 이상이면 서브테이블로 인정
    }
  }
  return false;
}

// '검증' 버튼: 프로그램이 만든 시간표를 원본과 대조 (토·일 모두)
// 방식: 실제 state를 백업 → 임시로 원본을 processSheetForDay로 다시 채움 →
//       임시 결과 vs 실제 결과 비교 → state 원상복구. (로직 복제 없이 100% 동일 대조)
function runVerification(){
  if(!lastImportWb){
    alert('먼저 합산 파일(🧠💪)을 불러와 주세요.\n\n검증은 방금 불러온 원본 파일과 현재 시간표를 대조합니다.\n(새로고침하면 원본이 사라지므로 파일을 다시 불러온 뒤 검증하세요.)');
    return;
  }
  const nameMap = buildNameMap();
  if(Object.keys(nameMap).length === 0){
    alert('환자명이 없습니다. 병실현황을 먼저 불러와 주세요.');
    return;
  }

  const { wb, sheetMap } = lastImportWb;

  // ===== 0) 사전 검사: 원본 파일이 애초에 올바른가? =====
  // 잘못된 파일로 검증하면 그 파일 기준으로 '일치'가 나와 진짜 오류를 놓치므로,
  // 먼저 파일을 점검하고 문제가 있으면 검증을 중단.
  const fileIssues = [];
  const fileChecks = [];
  const baseDate = state.date || '';

  // (1) 요일 시트가 있는지 = 주말 파일이 맞는지
  const mappedDays = Object.keys(sheetMap);
  if(mappedDays.length === 0){
    fileIssues.push({
      kind:'종류',
      msg:'불러온 파일에서 요일 시트를 찾지 못했습니다. 주말 시간표 파일이 아닐 수 있습니다.',
      fix:'요일별 시트가 들어있는 주말 합산 시간표 파일을 불러주세요.'
    });
  }else if(mappedDays.length === 1){
    fileIssues.push({
      kind:'종류',
      msg:`요일 시트가 1개(${mappedDays[0]}요일)뿐입니다. 주말 시간표는 보통 2일 이상입니다.`,
      fix:`토·일(공휴일이 있으면 그 날짜까지) 모든 요일 시트가 들어있는 파일인지 확인해주세요.`
    });
  }else{
    fileChecks.push(`주말 파일 확인 — 요일 시트 ${mappedDays.length}개 (${mappedDays.join('·')}요일)`);
  }

  // (2) 날짜 검사 — 각 요일 시트의 날짜가 그 요일에 설정된 날짜와 맞는지
  //     시트 안에 날짜가 없으면 시트 이름('07_18 토요일')에서도 찾는다.
  if(fileIssues.length === 0){
    const dayInfo = lastImportWb.dayInfo || {};
    syncDays().forEach(day=>{
      const sn = sheetMap[day];
      if(!sn) return;
      const ws0 = wb.Sheets[sn];
      const rg0 = XLSX.utils.decode_range(ws0['!ref'] || 'A1:AZ300');

      // 1순위: 시트 내용의 날짜
      let fd = extractSheetDate(ws0, rg0);
      let src = '시트 내용';
      // 2순위: 시트 이름의 'MM_DD' / 'MM월 DD일' 패턴
      if(!fd){
        const m2 = sn.match(/(\d{1,2})[_\-.월\s]+(\d{1,2})/);
        if(m2){
          const yr = (dayInfo[day] && dayInfo[day].iso)
            ? Number(dayInfo[day].iso.split('-')[0])
            : (state.date ? Number(state.date.split('-')[0]) : new Date().getFullYear());
          const cand = `${yr}-${String(m2[1]).padStart(2,'0')}-${String(m2[2]).padStart(2,'0')}`;
          if(!isNaN(new Date(cand).getTime())){ fd = cand; src = '시트 이름'; }
        }
      }
      // 3순위: 불러올 때 알아낸 날짜
      if(!fd && dayInfo[day] && dayInfo[day].iso){
        fd = dayInfo[day].iso; src = dayInfo[day].src || '자동 인식';
      }

      const wantISO = dateOfDay(day);   // 프로그램에 설정된 그 요일의 날짜
      if(!fd){
        fileIssues.push({
          kind:'날짜',
          msg:`${day}요일 시트에서 날짜를 찾지 못했습니다. (시트: "${sn}")`,
          fix:`시트 위쪽에 '2026년 7월 18일'처럼 날짜를 넣거나, 시트 이름을 '07_18 토요일' 형식으로 바꿔주세요. 그래야 올바른 날짜의 파일인지 확인할 수 있습니다.`
        });
        return;
      }
      if(wantISO && fd !== wantISO){
        fileIssues.push({
          kind:'날짜',
          msg:`${day}요일 시트 날짜(${formatDateKorean(fd)})가 설정된 날짜(${formatDateKorean(wantISO)})와 다릅니다.`,
          fix:`올바른 날짜의 주말 파일을 불러오거나, 화면 위쪽 📅 날짜에서 시작일·일수를 고쳐주세요.`
        });
      }else if(wantISO){
        fileChecks.push(`${day}요일 날짜 확인 — ${formatDateKorean(fd)} (${src} 기준, 설정과 일치)`);
      }else{
        fileChecks.push(`${day}요일 날짜 — ${formatDateKorean(fd)} (${src} 기준, 기준 날짜 미설정)`);
      }
    });
  }

  // (3) 예상 섹션 검사 — 각 요일 시트에 PT/OT/전기가 있는지
  //     시간표가 통째로 누락됐거나(예: 전기 파트 없음) 시트를 잘못 저장했을 때 잡아냄.
  if(fileIssues.length === 0){
    const expectedSections = ['PT','OT','전기'];
    syncDays().forEach(day=>{
      const sn = sheetMap[day];
      if(!sn) return;
      const ws0 = wb.Sheets[sn];
      const rg0 = XLSX.utils.decode_range(ws0['!ref'] || 'A1:AZ300');
      const missing = expectedSections.filter(s => !hasSectionHeader(ws0, rg0, s));
      if(missing.length > 0){
        fileIssues.push({
          kind:'섹션누락',
          msg:`${day}요일 시트에 예상 섹션이 보이지 않습니다: ${missing.join(', ')}`,
          fix:`엑셀 파일 "${sn}" 시트에 '${missing.join("', '")}' 섹션 헤더가 있는지 확인해주세요. 시간표가 통째로 누락됐거나 시트를 잘못 저장했을 수 있어요.`
        });
      }else{
        fileChecks.push(`${day}요일 예상 섹션 확인 — ${expectedSections.join(' · ')} 모두 있음`);
      }
    });
  }

  if(fileIssues.length > 0){
    showFileIssueReport(fileIssues);
    return;   // 검증 중단
  }

  // 1) 현재(사용자가 보는) 셀 상태를 깊은 복사로 백업
  const actualCells = {};   // day -> {key: cat}
  DAYS.forEach(day=>{
    actualCells[day] = {};
    ALL_ROOMS.forEach(room=>{
      const cells = state.rooms[room].cellsByDay[day];
      for(const k in cells){ actualCells[day][k] = cells[k]; }
    });
  });

  // 2) 원본으로 '기대 상태' 재생성 — 임시로 빈 셀에 다시 채움
  //    state를 직접 쓰므로, 셀/소스를 잠깐 비우고 채운 뒤 결과를 읽고 복원.
  const backupCellsByDay = {};
  const backupSourceByDay = {};
  DAYS.forEach(day=>{
    backupCellsByDay[day] = {};
    ALL_ROOMS.forEach(room=>{ backupCellsByDay[day][room] = state.rooms[room].cellsByDay[day]; });
    backupSourceByDay[day] = state.cellSourceByDay[day];
  });
  // 임시 초기화
  DAYS.forEach(day=>{
    ALL_ROOMS.forEach(room=>{ state.rooms[room].cellsByDay[day] = {}; });
    state.cellSourceByDay[day] = {};
  });

  const allUnmatched = new Set();
  try{
    DAYS.forEach(day=>{
      const sheetName = sheetMap[day];
      if(!sheetName) return;
      const result = processSheetForDay(wb, sheetName, day, nameMap);
      if(result && result.unmatched){ result.unmatched.forEach(n=>allUnmatched.add(n)); }
    });
  }catch(e){
    // 실패 시 복원하고 알림
    DAYS.forEach(day=>{
      ALL_ROOMS.forEach(room=>{ state.rooms[room].cellsByDay[day] = backupCellsByDay[day][room]; });
      state.cellSourceByDay[day] = backupSourceByDay[day];
    });
    console.error('검증 재생성 실패:', e);
    alert('검증 중 오류가 발생했습니다: ' + e.message);
    return;
  }

  // 3) 기대 상태 수집
  const expectedCells = {};
  DAYS.forEach(day=>{
    expectedCells[day] = {};
    ALL_ROOMS.forEach(room=>{
      const cells = state.rooms[room].cellsByDay[day];
      for(const k in cells){ expectedCells[day][k] = cells[k]; }
    });
  });

  // 4) state 원상복구
  DAYS.forEach(day=>{
    ALL_ROOMS.forEach(room=>{ state.rooms[room].cellsByDay[day] = backupCellsByDay[day][room]; });
    state.cellSourceByDay[day] = backupSourceByDay[day];
  });

  // 5) 기대 vs 실제 대조
  const problems = { missing: [], wrongFloor: [] };
  let checkedCells = 0;
  DAYS.forEach(day=>{
    for(const key in expectedCells[day]){
      checkedCells++;
      const exp = expectedCells[day][key];
      const act = actualCells[day][key];
      const [room, p] = [key.split('-')[0], key.split('-')[1]];
      const slot = key.split('-').slice(2).join('-');
      const name = (state.rooms[room] && state.rooms[room].patients[p] && state.rooms[room].patients[p].name) || '';
      if(act == null || act === ''){
        problems.missing.push({ day, room, slot, name, expected: exp });
      }else if(act !== exp){
        problems.wrongFloor.push({ day, room, slot, name, expected: exp, actual: act });
      }
    }
  });

  // 미매칭 이름 정리 (장비명 제외)
  const cleanUnmatched = [...allUnmatched].filter(n => n && n.length >= 2 && !EQUIP_WORDS.has(n));

  // 점검 항목 요약
  const catCount = {};
  DAYS.forEach(day=>{ for(const k in expectedCells[day]){ const c=expectedCells[day][k]; catCount[c]=(catCount[c]||0)+1; } });
  const catSummary = Object.entries(catCount).map(([c,n])=>`${c} ${n}칸`).join(' · ');
  const perDay = syncDays().map(d=>`${d} ${Object.keys(expectedCells[d]||{}).length}`).join(' · ');
  fileChecks.push(`대조한 칸 ${checkedCells}칸 (${perDay})`);
  fileChecks.push(`층 분포 — ${catSummary}`);
  fileChecks.push(`누락 검사 · 층 일치 검사 완료 (${syncDays().join('·')}요일 전체)`);

  showVerificationReport(problems, { checkedCells, checks: fileChecks, unmatchedCount: cleanUnmatched.length });
}

// 파일 자체에 문제가 있을 때 — 검증 중단하고 무엇을 고쳐야 하는지 안내
function showFileIssueReport(issues){
  const panel = document.getElementById('verify-panel');
  if(!panel) return;
  let html = '';
  html += `<div class="vf-head bad">🚫 검증 중단 — 불러온 파일을 먼저 확인해주세요 (${issues.length}건)`;
  html += `<button class="vf-close" onclick="document.getElementById('verify-panel').style.display='none'">✕</button></div>`;
  html += `<div class="vf-sec"><div class="vf-sec-title">문제</div>`;
  issues.forEach(it=>{
    html += `<div class="vf-row"><b>[${it.kind}]</b> ${it.msg}<br><span style="color:#2c6fb3">→ ${it.fix}</span></div>`;
  });
  html += `</div>`;
  html += `<div class="vf-foot">※ 잘못된 파일로 검증하면 그 파일 기준으로 '일치'가 나와 진짜 오류를 놓칠 수 있어, 검증을 진행하지 않았습니다.</div>`;
  panel.innerHTML = html;
  panel.style.display = 'block';
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function showVerificationReport(problems, meta){
  const panel = document.getElementById('verify-panel');
  if(!panel) return;
  const total = problems.missing.length + problems.wrongFloor.length;
  const pass = total === 0;
  let html = '';
  html += `<div class="vf-head ${pass?'ok':'bad'}">`;
  html += pass
    ? `✅ 통과 — 원본과 시간표가 일치합니다 (${meta.checkedCells}칸 확인)`
    : `⚠️ 문제 ${total}건 발견 (${meta.checkedCells}칸 확인)`;
  html += `<button class="vf-close" onclick="document.getElementById('verify-panel').style.display='none'">✕</button></div>`;

  if(problems.missing.length){
    html += `<div class="vf-sec"><div class="vf-sec-title">🔴 누락 — 원본엔 있는데 표에 안 채워진 칸 (${problems.missing.length})</div>`;
    problems.missing.slice(0,60).forEach(m=>{
      html += `<div class="vf-row"><span class="vf-day">${m.day}</span><span class="vf-room">${m.room}호</span> <span class="vf-nm">${m.name||'(이름?)'}</span> <span class="vf-slot">${m.slot}</span> → 원본 <b>${m.expected}</b>인데 <b>빈칸</b></div>`;
    });
    if(problems.missing.length>60) html += `<div class="vf-more">…외 ${problems.missing.length-60}건</div>`;
    html += `</div>`;
  }
  if(problems.wrongFloor.length){
    html += `<div class="vf-sec"><div class="vf-sec-title">🟠 층 다름 — 원본과 다른 층으로 채워진 칸 (${problems.wrongFloor.length})</div>`;
    problems.wrongFloor.slice(0,60).forEach(m=>{
      html += `<div class="vf-row"><span class="vf-day">${m.day}</span><span class="vf-room">${m.room}호</span> <span class="vf-nm">${m.name||'(이름?)'}</span> <span class="vf-slot">${m.slot}</span> → 표 <b>${m.actual}</b> / 원본 <b>${m.expected}</b></div>`;
    });
    if(problems.wrongFloor.length>60) html += `<div class="vf-more">…외 ${problems.wrongFloor.length-60}건</div>`;
    html += `</div>`;
  }
  if(meta.checks && meta.checks.length){
    html += `<div class="vf-sec"><div class="vf-sec-title">🔎 점검한 내용 (${meta.checks.length})</div>`;
    meta.checks.forEach(c=>{ html += `<div class="vf-row">✔ ${c}</div>`; });
    if(meta.unmatchedCount){
      html += `<div class="vf-row" style="color:#8a97ab">· 병실 명단에 없는 이름 ${meta.unmatchedCount}명은 외래·타병동으로 보고 검사에서 제외했습니다</div>`;
    }
    html += `</div>`;
  }
  if(pass){
    html += `<div class="vf-sec"><div class="vf-row" style="color:#2c7a3f">모든 요일의 환자가 원본과 동일한 층으로 정확히 채워졌습니다.</div></div>`;
  }else{
    html += `<div class="vf-foot">※ 손으로 직접 바꾼 칸은 '층 다름/누락'으로 표시될 수 있어요. 실제 수정한 칸이면 무시하세요.</div>`;
  }
  panel.innerHTML = html;
  panel.style.display = 'block';
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function autoFillDaily(ev){
  const file = ev.target.files[0];
  if(!file) return;

  // 환자명이 입력되어 있는지 확인
  const nameMap = buildNameMap();
  if(Object.keys(nameMap).length === 0){
    alert('먼저 환자명을 입력해주세요.\n방법: 병실현황 불러오기 또는 시간표에 직접 타이핑');
    ev.target.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(new Uint8Array(e.target.result), {
        type:'array',
        cellFormula:false,
        cellStyles:false,
        cellNF:false,
        cellHTML:false,
        cellText:false,
        bookVBA:false,
        bookSheets:false,
        bookFiles:true  // 원본 XML 접근용 (밑줄 서식 감지)
      });

      // === 주말 시트 자동 감지 (요일 수 무관: 2일·3일·공휴일 포함) ===
      // 각 시트에서 날짜를 뽑아 요일을 계산한다. 날짜가 없으면 시트명의 요일 단어로 판별.
      // 데이터가 거의 없는 시트는 제외.
      const detectedSheets = [];   // [{sheet, iso, key, cells}]
      for(const sn of wb.SheetNames){
        const wsx = wb.Sheets[sn];
        if(!wsx || !wsx['!ref']) continue;
        const rgx = XLSX.utils.decode_range(wsx['!ref']);
        // 내용이 거의 없는 시트는 건너뜀
        let filled = 0;
        for(let r = rgx.s.r; r <= Math.min(rgx.e.r, rgx.s.r + 60); r++){
          for(let c = rgx.s.c; c <= Math.min(rgx.e.c, rgx.s.c + 30); c++){
            if(wsx[XLSX.utils.encode_cell({r,c})]) filled++;
          }
        }
        if(filled < 20) continue;

        // 1순위: 시트 안의 날짜
        let iso = extractSheetDate(wsx, rgx);
        let key = iso ? wdKeyOf(iso) : null;

        // 2순위: 시트명의 요일 단어 (금요일/토요일/일요일 …)
        if(!key){
          const m = sn.match(/([일월화수목금토])요일/);
          if(m) key = m[1];
        }
        // 3순위: 시트명의 'MM_DD' 또는 'MM월DD일' 패턴 → 올해 기준 날짜
        if(!iso){
          const m2 = sn.match(/(\d{1,2})[_\-.월\s]+(\d{1,2})/);
          if(m2){
            const yr = state.date ? Number(state.date.split('-')[0]) : new Date().getFullYear();
            const mo = String(m2[1]).padStart(2,'0'), dd = String(m2[2]).padStart(2,'0');
            const cand = `${yr}-${mo}-${dd}`;
            if(!isNaN(new Date(cand).getTime())){
              iso = cand;
              if(!key) key = wdKeyOf(iso);
            }
          }
        }
        if(!key) continue;                       // 요일을 못 정하면 제외
        detectedSheets.push({ sheet: sn, iso: iso || '', key, cells: filled });
      }

      // 날짜순 정렬 (날짜 없으면 요일 순서로)
      const WD_ORDER = {'월':1,'화':2,'수':3,'목':4,'금':5,'토':6,'일':7};
      detectedSheets.sort((a,b)=>{
        if(a.iso && b.iso) return a.iso < b.iso ? -1 : a.iso > b.iso ? 1 : 0;
        return (WD_ORDER[a.key]||9) - (WD_ORDER[b.key]||9);
      });
      // 같은 요일이 여러 시트면 내용이 많은 쪽만 사용
      const bestByKey = {};
      detectedSheets.forEach(d=>{
        if(!bestByKey[d.key] || d.cells > bestByKey[d.key].cells) bestByKey[d.key] = d;
      });
      const dayEntries = Object.values(bestByKey).sort((a,b)=>{
        if(a.iso && b.iso) return a.iso < b.iso ? -1 : a.iso > b.iso ? 1 : 0;
        return (WD_ORDER[a.key]||9) - (WD_ORDER[b.key]||9);
      });

      const sheetMap = {};   // {'금': sheetName, '토': ..., '일': ...}
      dayEntries.forEach(d=>{ sheetMap[d.key] = d.sheet; });

      // 요일 시트를 하나도 못 찾으면 → 단일 시트 fallback
      if(dayEntries.length === 0){
        const sheetName = pickBestSheet(wb, state.date);
        console.warn('[자동입력] 요일 시트를 찾지 못함. 단일 시트로 처리:', sheetName);
        sheetMap[state.activeDay] = sheetName;
        dayEntries.push({ sheet: sheetName, iso: state.date || '', key: state.activeDay, cells: 0 });
      }

      // === 감지한 요일 구성을 프로그램에 반영 (2일이든 3일이든) ===
      const newDayList = dayEntries.map(d=>({
        key: d.key,
        date: d.iso || ''
      }));
      // 날짜가 비어있는 항목은 앞뒤 날짜로 보정
      const anchorIdx = newDayList.findIndex(d=>d.date);
      if(anchorIdx >= 0){
        const [ay,am,ad] = newDayList[anchorIdx].date.split('-').map(Number);
        newDayList.forEach((d,i)=>{
          if(d.date) return;
          const dt = new Date(ay, am-1, ad + (i - anchorIdx));
          d.date = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        });
      }
      state.dayList = newDayList;
      state.date = newDayList[0].date || state.date;
      syncDays();
      reconcileDayMaps();

      console.log('[자동입력] 감지한 요일:', newDayList, '/ 시트 매핑:', sheetMap);

      // 대표 시트 = 첫 요일 시트 (날짜는 위 dayList 구성에서 이미 반영됨)
      const repSheetName = dayEntries[0].sheet;
      updateDateDisplay();
      renderDayButtons();

      // === 감지한 모든 요일 시트 처리 ===
      // 검증용 원본 보관 (세션 메모리) — '검증' 버튼이 이 원본으로 재대조
      // 불러올 때 알아낸 요일별 날짜(dayInfo)도 함께 보관해야
      // 시트 안에 날짜가 없고 시트명에만 있는 파일도 검증이 날짜를 확인할 수 있다.
      const dayInfo = {};
      dayEntries.forEach(d=>{
        const nd = newDayList.find(x=>x.key === d.key);
        dayInfo[d.key] = {
          sheet: d.sheet,
          iso: (nd && nd.date) || d.iso || '',
          src: d.iso ? '시트 내용' : '시트 이름'
        };
      });
      lastImportWb = { wb, sheetMap: {...sheetMap}, dayInfo };

      let totalFilled = 0;
      const totalMatched = new Set();
      const totalUnmatched = new Set();
      const dayResults = {};  // {요일키: filledCount}

      DAYS.forEach(day=>{
        const sheetName = sheetMap[day];
        if(!sheetName){
          console.log(`[자동입력] ${day}요일 시트 없음 — 건너뜀`);
          return;
        }
        const result = processSheetForDay(
          wb, sheetName, day, nameMap
        );
        totalFilled += result.filledCount;
        result.matched.forEach(n=>totalMatched.add(n));
        result.unmatched.forEach(n=>totalUnmatched.add(n));
        dayResults[day] = result.filledCount;
      });

      // 카운트 저장 + 인디케이터 업데이트
      state.loadCounts.combined = totalFilled;
      saveLocal();
      render();
      updateLoadIndicators();

      const _dateNote = state.date ? ` · 📅 ${state.date}` : '';
      const dayMsg = Object.entries(dayResults).map(([d,n])=>`${d} ${n}건`).join(' · ');
      let msg = `자동 채움: ${totalFilled}개 셀 (${dayMsg}, ${totalMatched.size}명 매칭)${_dateNote}`;
      if(totalUnmatched.size > 0){
        console.log('[미매칭 환자명]', [...totalUnmatched]);
      }
      showStatus(msg);

      // 매칭 0건이면 시트 안내
      if(totalMatched.size === 0){
        alert(`매칭 0건입니다.\n\n파일 시트: ${wb.SheetNames.join(', ')}\n매핑된 시트: ${JSON.stringify(sheetMap)}\n\n• 요일 시트(토/일, 공휴일 포함)가 있는 주말 파일인지 확인해주세요.\n• 또는 병실현황을 먼저 불러왔는지 확인해주세요.`);
      }
    }catch(err){
      console.error('자동 채우기 에러:', err);
      alert('자동 채우기 실패: '+err.message+'\n\n환자명을 직접 입력하시거나 다른 방식을 사용해주세요.');
    }
  };
  reader.readAsArrayBuffer(file);
  ev.target.value = '';
}

// 한 시트의 데이터를 특정 요일(day)의 cellsByDay에 채움
// 카테고리는 시트 안의 (3층)/(1층) 섹션 헤더로 자동 분기
// 반환: { filledCount, matched: Set, unmatched: Set }
function processSheetForDay(wb, sheetName, day, nameMap){
  const ws = wb.Sheets[sheetName];
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:AZ300');

  // 밑줄 친 셀 = 액팅 처리 → 이동반 제외 대상
  const underlineSet = buildUnderlineSet(wb, sheetName);
  if(underlineSet.size > 0) console.log(`[${day}] 밑줄(제외) 셀:`, underlineSet.size, '개');

  // 컬럼 헤더 분석 (CPM→1층, 시행(3층)→3층, 외래/재택→제외)
  const colHeaders = buildColHeaders(ws, range);

  // === ST/언어 가로 서브섹션 사전 스캔 ===
  const stColumns = new Set();
  const SECTION_LABEL = /^(OT|NDT|PT|ST|MAT|FES|GAIT|RAT|로봇\s*OT|로봇|매트|회복기|통증|언어|스피치|speech)\s*$/i;
  const ST_LABEL = /^(ST|언어|스피치|speech)\s*$/i;
  for(let r = range.s.r; r <= range.e.r; r++){
    const labels = [];
    for(let c = range.s.c + 1; c <= range.e.c; c++){
      const cell = ws[XLSX.utils.encode_cell({r, c})];
      if(!cell || typeof cell.v !== 'string') continue;
      const v = cell.v.trim();
      if(!v) continue;
      if(SECTION_LABEL.test(v)){
        labels.push({col:c, label:v});
      }
    }
    if(labels.length < 2) continue;
    labels.forEach((lbl, idx)=>{
      if(!ST_LABEL.test(lbl.label)) return;
      const endCol = idx + 1 < labels.length
        ? labels[idx+1].col - 1
        : Math.min(lbl.col + 10, range.e.c);
      for(let cc = lbl.col; cc <= endCol; cc++) stColumns.add(cc);
    });
  }
  if(stColumns.size > 0) console.log(`[${day}] ST 컬럼:`, [...stColumns].sort((a,b)=>a-b));

  // === '전기' / '통증' sub-table 사전 스캔 — 카테고리 강제 분류 ===
  // 헤더 예: "전기(14)", "전기", "통증" 등. 둘 다 같은 패턴.
  // 식별 조건:
  //   ① 셀 텍스트에 "전기" 또는 "통증"이 포함
  //   ② 같은 행 바로 다음 컬럼들에 자리 번호(1, 2, 3, ...)가 1부터 연속해서 나옴
  // → 둘 다 만족하는 셀만 표 헤더로 인정.
  //   "전기"/"통증"만 단독으로 있는 라벨/메모 셀은 자리 번호가 없어서 자동으로 걸러짐.
  // 헤더 다음 행부터 시간 슬롯(헤더와 같은 컬럼) + 환자명(자리 번호 컬럼).
  // 메인 루프와 별도 처리 — 메인 루프가 시간 컬럼을 잘못 잡거나 통증/전기 영역 환자를
  // 일반 카테고리로 분류하는 걸 막기 위함.
  // 카테고리: "통증" 헤더 → 통증, "전기" 헤더 → 3층 (사용자 지정).
  const subtableEntries = [];   // [{r, timeSlot, seatCols, category}]
  const subtableCellSet = new Set();  // 메인 루프에서 스킵할 셀 ref 집합
  for(let r = range.s.r; r <= range.e.r; r++){
    for(let c = range.s.c; c <= range.e.c; c++){
      const cell = ws[XLSX.utils.encode_cell({r, c})];
      if(!cell || typeof cell.v !== 'string') continue;
      const trimmed = cell.v.trim();
      const isElectric = /전기/.test(trimmed);
      const isPain = /^통증/.test(trimmed);
      if(!isElectric && !isPain) continue;

      // 같은 행에서 자리 번호(1,2,3,...) 컬럼 수집 — 1부터 연속해야 함
      const seatCols = [];
      let expectSeat = 1;
      for(let cc = c+1; cc <= range.e.c; cc++){
        const sc = ws[XLSX.utils.encode_cell({r, c: cc})];
        if(sc && typeof sc.v === 'number' && Number.isInteger(sc.v) && sc.v === expectSeat){
          seatCols.push(cc);
          expectSeat++;
        }else if(sc && sc.v != null && sc.v !== ''){
          break;  // 자리 번호 외 다른 값이 나오면 표 폭 종료
        }else if(seatCols.length > 0){
          break;  // 자리가 한 번 시작된 후 빈 셀이 나오면 종료
        }
      }
      if(seatCols.length === 0) continue;  // 자리 번호가 없으면 표가 아님

      const category = isPain ? '통증' : '3층';

      // 헤더 다음 행부터 시간 슬롯 (시간은 헤더와 같은 컬럼)
      //  점심시간 행 등 시간 없는 행은 건너뛰고 계속 진행.
      //  새 섹션 헤더((1층)/(3층) 또는 PT/OT/통증 등)가 A열에 나오면 sub-table 종료.
      //   ※ "6월 20일 토요일 주말시간표 (1층)" 같은 라벨도 잡기 위해 (N층)은 위치 무관.
      const NEW_SECTION_RE = /\(\s*[13]\s*층\s*\)|^(PT|OT|NDT|MAT|GAIT|FES|매트|로봇|회복기|신경계|근골|기구|통증|언어|스피치|speech|ST)/i;
      let dataRows = 0;
      for(let rr = r+1; rr <= range.e.r; rr++){
        // 새 섹션 헤더 만나면 sub-table 종료
        const aCell = ws[XLSX.utils.encode_cell({r: rr, c: range.s.c})];
        if(aCell && typeof aCell.v === 'string' && NEW_SECTION_RE.test(aCell.v.trim())) break;

        // 시간이 있는 행만 데이터 entry 추가 (점심시간/빈 행은 skip 후 계속)
        const tcell = ws[XLSX.utils.encode_cell({r: rr, c})];
        const t = tcell ? parseTimeValue(tcell.v, tcell.w) : null;
        if(!t) continue;

        subtableEntries.push({r: rr, timeSlot: t, seatCols, category});
        // 시간 셀 + 자리 컬럼 셀 모두 메인 루프 처리에서 제외
        subtableCellSet.add(XLSX.utils.encode_cell({r: rr, c}));
        seatCols.forEach(cc => subtableCellSet.add(XLSX.utils.encode_cell({r: rr, c: cc})));
        dataRows++;
      }
      console.log(`[${day}] ${category} 표 감지: ${XLSX.utils.encode_cell({r,c})} "${trimmed}" 자리=${seatCols.length}열 데이터=${dataRows}행`);
    }
  }
  if(subtableEntries.length > 0){
    console.log(`[${day}] 전기/통증 표 셀 (메인 루프 제외 + 별도 처리): ${subtableCellSet.size}개`);
  }

  let filledCount = 0;
  const unmatched = new Set();
  const matched = new Set();
  // 합산 파일: 시트 가장 위쪽이 보통 (3층) 섹션이므로 기본값 3층
  // 어차피 시트 안의 (3층)/(1층) 헤더가 나오면 그에 맞게 전환됨
  let currentCategory = '3층';
  const sectionCounts = {};

  // 이 요일의 셀 source 추적 (override vs default)
  const cellSource = state.cellSourceByDay[day];

  for(let r = range.s.r; r <= range.e.r; r++){
    // A열 섹션 헤더 감지
    const cellA = ws[XLSX.utils.encode_cell({r, c: range.s.c})];
    if(cellA && cellA.v != null && typeof cellA.v === 'string'){
      const label = String(cellA.v).trim();
      if(label){
        // === 합산 파일 핵심: (3층) / (1층) 섹션 헤더 자동 감지 ===
        // 예: '6월 14일 일요일 주말시간표 (3층)', '... (1층)'
        if(/\(\s*3\s*층\s*\)/.test(label)){
          currentCategory = '3층';
          sectionCounts[label] = '3층';
          continue;
        }else if(/\(\s*1\s*층\s*\)/.test(label)){
          currentCategory = '1층';
          sectionCounts[label] = '1층';
          continue;
        }else if(/^통증/.test(label)){
          currentCategory = '통증';
          sectionCounts[label] = '통증';
          continue;
        }else if(/^(ST|언어|스피치|speech)/i.test(label)){
          currentCategory = '1층';
          sectionCounts[label] = '1층';
          continue;
        }else if(/^(NDT|PT|OT|MAT|GAIT|FES|매트|로봇|회복기|신경계|근골|기구)/.test(label)){
          // 일반 섹션 헤더(PT/OT 등)는 카테고리 유지 — 직전 (3층)/(1층) 결정을 이어감
          sectionCounts[label] = currentCategory;
          continue;
        }
        // 점심시간/공지 등 그 외 문자열은 그냥 건너뛰기
        if(!/^[\d.:~ ]+$/.test(label)) continue;
      }
    }

    // 이 행의 시간 슬롯 찾기
    let timeSlot = null;
    for(let c = range.s.c; c <= Math.min(range.s.c + 20, range.e.c); c++){
      const cell = ws[XLSX.utils.encode_cell({r, c})];
      if(!cell) continue;
      const t = parseTimeValue(cell.v, cell.w);
      if(t){ timeSlot = t; break; }
    }
    if(!timeSlot) continue;

    // 시간이 있는 행 → 모든 셀에서 환자명 추출
    for(let c = range.s.c; c <= range.e.c; c++){
      const ref = XLSX.utils.encode_cell({r, c});
      // 전기/통증 표 영역 → 별도 루프에서 카테고리 강제 분류하므로 메인 루프에서는 스킵
      if(subtableCellSet.has(ref)) continue;
      const cell = ws[ref];
      if(!cell || cell.v == null || cell.v === '') continue;
      // 시간 셀은 건너뜀
      if(parseTimeValue(cell.v, cell.w)) continue;
      // 밑줄 친 셀(액팅 처리) → 제외
      if(underlineSet.has(ref)) continue;
      // 컬럼 헤더 오버라이드 (외래/재택 → 제외)
      const colOv = getColOverride(colHeaders, r, c);
      if(colOv && colOv.exclude) continue;

      const items = extractPatientNames(cell.v, nameMap);

      // 바로 아래 셀에 단독 태그가 있는지 확인 (주말은 1층/3층/통증만, 음악치료실=1층)
      let adjacentOverride = null;
      let adjacentExclude = false;
      const TAG_ONLY = /^\s*(\(침상\)|\(HOLD\)|\(1층\)|\(3층\)|\(통증\)|\(음악치료실\)|\(치료실\s*[→\->]+\s*병동\))\s*$/;
      const adjCell = ws[XLSX.utils.encode_cell({r: r+1, c})];
      if(adjCell && adjCell.v != null){
        const sAdj = String(adjCell.v).trim();
        const matchAdj = sAdj.match(TAG_ONLY);
        if(matchAdj){
          const tagAdj = matchAdj[1];
          if(/침상|HOLD/i.test(tagAdj)){ adjacentExclude = true; }
          else if(/^\(1층\)$/.test(tagAdj)){ adjacentOverride = '1층'; }
          else if(/^\(3층\)$/.test(tagAdj)){ adjacentOverride = '3층'; }
          else if(/^\(통증\)$/.test(tagAdj)){ adjacentOverride = '통증'; }
          else if(/^\(음악치료실\)$/.test(tagAdj)){ adjacentOverride = '1층'; }   // 음악치료실은 1층
          else if(/치료실\s*[→\->]+\s*병동/.test(tagAdj)){ adjacentOverride = '3층'; }
        }
      }

      items.forEach(({name, override, exclude, homonymNum})=>{
        const effOverride = override || adjacentOverride;
        const effExclude = exclude || adjacentExclude;
        if(effExclude) return;

        const m_ = nameMap[name];
        if(!m_ || m_.length === 0){
          unmatched.add(name);
          return;
        }

        // 동명이인 처리 (주말 단순 버전 — 알림/패널 없음):
        //  ① 시트에 번호(homonymNum)가 있고 명단에 같은 번호(num)가 있으면 그 1명으로 확정
        //  ② 시트엔 번호 없고 명단의 같은 이름이 모두 번호 붙어 있으면 → 다른 사람 → 채움 제외
        //     (예: 명단 '이종례2'만 있고 시트 'H이종례' → 외래·타병동의 다른 이종례)
        //  ③ 그 외는 m_ 전체를 대상 (기존 동작 유지)
        let targets = m_;
        if(homonymNum){
          const exact = m_.find(x => x.num === homonymNum);
          if(exact) targets = [exact];
        }else{
          const plain = m_.filter(x => x.num === null);
          if(plain.length === 0){
            // 명단엔 모두 번호 붙은 동명이인뿐 → 시트의 plain은 다른 사람
            console.log(`[${day}][자동입력 skip] "${name}": 명단엔 모두 번호(${m_.map(x=>x.num).join(',')}) — 시트엔 번호 없음 → 다른 사람으로 보고 자동입력 제외`);
            return;
          }
          targets = plain;
        }

        // ST 컬럼이면서 +운동기구 → 3층, 전기자극류는 1층 유지
        let stCat = '1층';
        if(stColumns.has(c)){
          const cellTxt = String(cell.v);
          const hasGear = /\+/.test(cellTxt);
          const isEstim = /\+\s*(전기|안면전기|전기펜|전기장갑|V|taVNS|TDCS|tDCS)/i.test(cellTxt);
          if(hasGear && !isEstim) stCat = '3층';
        }
        const colCategory = (colOv && colOv.cat) ? colOv.cat
                          : stColumns.has(c) ? stCat
                          : currentCategory;

        targets.forEach(({room, p, tag})=>{
          const finalCat = effOverride || tag || colCategory;
          // 주말 카테고리만 허용 (외래/병동 등 흘러들면 무시)
          if(!CATEGORIES[finalCat]){
            console.warn(`[${day}] ${name} → ${finalCat}은 주말 카테고리가 아님. 건너뜀`);
            return;
          }
          const key = makeCellKey(room, p, timeSlot);
          const cells = state.rooms[room].cellsByDay[day];

          const isOverride = !!(effOverride || tag || (colOv && colOv.cat));
          if(isOverride){
            cells[key] = finalCat;
            cellSource[key] = 'override';
            filledCount++;
            matched.add(name);
          }else if(cellSource[key] !== 'override'){
            cells[key] = finalCat;
            cellSource[key] = 'default';
            filledCount++;
            matched.add(name);
          }else{
            matched.add(name);
          }
        });
      });
    }
  }

  console.log(`[${day}] 인식한 섹션:`, sectionCounts);

  // === '전기' / '통증' sub-table 환자 자동입력 — 헤더에 따라 카테고리 강제 분류 ===
  // 메인 루프에서 제외된 sub-table 셀들을 정확한 시간 슬롯과 함께 처리.
  // "전기" 헤더 → 3층 / "통증" 헤더 → 통증 (사용자 지정).
  subtableEntries.forEach(({r, timeSlot, seatCols, category})=>{
    seatCols.forEach(c => {
      const ref = XLSX.utils.encode_cell({r, c});
      const cell = ws[ref];
      if(!cell || cell.v == null || cell.v === '') return;
      if(underlineSet.has(ref)) return;

      const items = extractPatientNames(cell.v, nameMap);
      items.forEach(({name, override, exclude, homonymNum})=>{
        if(exclude) return;

        const m_ = nameMap[name];
        if(!m_ || m_.length === 0){
          unmatched.add(name);
          return;
        }

        // 동명이인 처리 (메인 루프와 동일 로직)
        let targets = m_;
        if(homonymNum){
          const exact = m_.find(x => x.num === homonymNum);
          if(exact) targets = [exact];
        }else{
          const plain = m_.filter(x => x.num === null);
          if(plain.length === 0){
            console.log(`[${day}][${category} skip] "${name}": 명단엔 번호 붙은 동명이인뿐`);
            return;
          }
          targets = plain;
        }

        targets.forEach(({room, p, tag})=>{
          // 환자별 (1층)/(통증)/(3층) 줄 태그가 있으면 그대로 우선, 없으면 표 카테고리
          const finalCat = override || tag || category;
          if(!CATEGORIES[finalCat]){
            console.warn(`[${day}] ${name} → ${finalCat}은 주말 카테고리 아님. 건너뜀`);
            return;
          }
          const key = makeCellKey(room, p, timeSlot);
          const cells = state.rooms[room].cellsByDay[day];
          // sub-table은 override 우선권 — 일반 자동입력 결과를 덮어쓸 수 있음
          cells[key] = finalCat;
          cellSource[key] = 'override';
          filledCount++;
          matched.add(name);
        });
      });
    });
  });

  return { filledCount, matched, unmatched };
}

// ===== RBCLR 엑셀 불러오기 (환자명만) =====
function importXLSX(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(new Uint8Array(e.target.result), {
        type:'array',
        cellFormula:false,
        cellStyles:false,
        cellNF:false,
        cellHTML:false,
        cellText:false,
        bookVBA:false,
        bookSheets:false
      });
      let sheetName = wb.SheetNames.find(n=>n.includes('수정') && n.includes('이동반'))
                    || wb.SheetNames.find(n=>n.includes('수정'))
                    || wb.SheetNames.find(n=>n.includes('이동반'))
                    || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = readSheetAsRows(ws);

      let imported = 0;
      let currentRoom = null;
      let patientIdx = 0;

      rows.forEach(row=>{
        // 첫 컬럼: 호실 번호 또는 빈칸
        const c0 = String(row[0]||'').trim();
        const c1 = String(row[1]||'').trim();
        if(/^[45]\d{2}$/.test(c0)){
          const r = parseInt(c0);
          if(ALL_ROOMS.includes(r)){
            currentRoom = r;
            patientIdx = 0;
          }else{
            currentRoom = null;
            return;
          }
        }
        if(currentRoom && patientIdx < PATIENTS_PER_ROOM){
          // 두 번째 컬럼이 환자 이름
          if(c1){
            state.rooms[currentRoom].patients[patientIdx].name = c1;
            imported++;
          }
          patientIdx++;
        }
      });

      saveLocal();
      render();
      showStatus(`환자명 ${imported}개 불러옴`);
    }catch(err){
      alert('엑셀 읽기 실패: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  ev.target.value = '';
}

// === 지난 주말 데이터 자동 초기화 ===
// 설정된 주말 기간의 '마지막 날'이 이미 지났으면 시간표를 비운다.
// (금·토·일처럼 공휴일이 낀 3일 주말도 올바르게 판단)
(function clearIfStale(){
  const todayISO = (()=>{ const d=new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
  let lastISO = '';
  if(state.dayList && state.dayList.length){
    lastISO = state.dayList[state.dayList.length-1].date || '';
  }else if(state.date){
    // 구버전 호환: 첫날 + 1일(=일요일)까지로 간주
    const [y,m,d] = state.date.split('-').map(Number);
    const dt = new Date(y, m-1, d+1);
    lastISO = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }
  if(lastISO && lastISO < todayISO){
    ALL_ROOMS.forEach(r=>{ state.rooms[r].cellsByDay = makeEmptyDayMap(); });
    state.cellSourceByDay = makeEmptyDayMap();
    if(state.loadCounts){ state.loadCounts.combined = 0; }
    state.date = '';
    state.dayList = [];
    syncDays();
    reconcileDayMaps();
    saveLocal();
  }
})();

// 탭 동기화
document.querySelectorAll('.tab').forEach(t=>{
  t.classList.toggle('active', t.dataset.floor === state.view);
});
// 요일 버튼 생성 (2일·3일 등 dayList에 맞춰 동적으로)
renderDayButtons();
// 인디케이터/날짜 표시 복원
updateLoadIndicators();
updateDateDisplay();
render();
</script>
</body>
</html>
