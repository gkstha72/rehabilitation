function showVerificationReport(problems, meta){
  const panel = document.getElementById('verify-panel');
  if(!panel) return;
  const totalProblems = problems.missing.length + problems.wrongFloor.length;
  const pass = totalProblems === 0;

  const floorName = c => c;  // 그대로 표시
  let html = '';
  html += `<div class="vf-head ${pass?'ok':'bad'}">`;
  html += pass
    ? `✅ 통과 — 원본과 시간표가 일치합니다 (${meta.checkedCells}칸 확인)`
    : `⚠️ 문제 ${totalProblems}건 발견 (${meta.checkedCells}칸 확인)`;
  html += `<button class="vf-close" onclick="document.getElementById('verify-panel').style.display='none'">✕</button>`;
  html += `</div>`;

  if(problems.missing.length){
    html += `<div class="vf-sec"><div class="vf-sec-title">🔴 누락 — 원본엔 있는데 표에 안 채워진 칸 (${problems.missing.length})</div>`;
    problems.missing.slice(0, 60).forEach(m=>{
      html += `<div class="vf-row"><span class="vf-room">${m.room}호</span> <span class="vf-nm">${m.name||'(이름?)'}</span> <span class="vf-slot">${m.slot}</span> → 원본 <b>${floorName(m.expected)}</b>인데 <b>빈칸</b></div>`;
    });
    if(problems.missing.length > 60) html += `<div class="vf-more">…외 ${problems.missing.length-60}건</div>`;
    html += `</div>`;
  }
  if(problems.wrongFloor.length){
    html += `<div class="vf-sec"><div class="vf-sec-title">🟠 층 다름 — 원본과 다른 층으로 채워진 칸 (${problems.wrongFloor.length})</div>`;
    problems.wrongFloor.slice(0, 60).forEach(m=>{
      html += `<div class="vf-row"><span class="vf-room">${m.room}호</span> <span class="vf-nm">${m.name||'(이름?)'}</span> <span class="vf-slot">${m.slot}</span> → 표 <b>${floorName(m.actual)}</b> / 원본 <b>${floorName(m.expected)}</b></div>`;
    });
    if(problems.wrongFloor.length > 60) html += `<div class="vf-more">…외 ${problems.wrongFloor.length-60}건</div>`;
    html += `</div>`;
  }
  if(meta.checks && meta.checks.length){
    html += `<div class="vf-sec"><div class="vf-sec-title">🔎 점검한 내용 (${meta.checks.length})</div>`;
    meta.checks.forEach(c=>{
      html += `<div class="vf-row">✔ ${c}</div>`;
    });
    if(meta.unmatchedCount){
      html += `<div class="vf-row" style="color:#8a97ab">· 병실 명단에 없는 이름 ${meta.unmatchedCount}명은 외래·타병동으로 보고 검사에서 제외했습니다</div>`;
    }
    html += `</div>`;
  }
  if(pass){
    html += `<div class="vf-sec"><div class="vf-row" style="color:#2c7a3f">모든 환자가 원본과 동일한 층으로 정확히 채워졌습니다.</div></div>`;
  } else {
    html += `<div class="vf-foot">※ 손으로 (외래)로 바꿨거나 지운 칸은 '층 다름/누락'으로 표시될 수 있어요. 실제 수정한 칸이면 무시하세요.</div>`;
  }

  panel.innerHTML = html;
  panel.style.display = 'block';
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function autoFillDaily(ev, defaultCategory){
  const file = ev.target.files[0];
  if(!file) return;

  // 환자명이 입력되어 있는지 확인
  const nameMap = buildNameMap();
  if(Object.keys(nameMap).length === 0){
    alert('먼저 환자명을 입력해주세요.\n방법: 병실현황 불러오기 또는 시간표에 직접 타이핑');
    ev.target.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(new Uint8Array(e.target.result), {
        type:'array',
        cellFormula:false,
        cellStyles:false,
        cellNF:false,
        cellHTML:false,
        cellText:false,
        bookVBA:false,
        bookSheets:false,
        bookFiles:true  // 원본 XML 접근용 (밑줄 서식 감지)
      });

      // 사용자 날짜에 맞는 시트 자동 선택 (없으면 데이터 가장 많은 시트)
      const sheetName = pickBestSheet(wb, state.date);
      console.log('[자동입력] 사용 시트:', sheetName, '/ 전체 시트:', wb.SheetNames);
      const ws = wb.Sheets[sheetName];
      const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:AZ300');

      // === 파일 종류 자동 감지 → 버튼을 잘못 눌러도 올바른 층으로 분류 ===
      // (예: 근골 파일을 신경계 버튼에 넣어도 1층으로 처리)
      const detected = detectFileCategory(ws, range);
      let buttonWasWrong = false;
      if(detected && detected !== defaultCategory){
        buttonWasWrong = true;
        console.log(`[자동입력] 버튼(${defaultCategory==='3층'?'신경계':'근골'})과 파일 내용이 다름 → 파일에 맞춰 ${detected==='3층'?'신경계(3층)':'근골(1층)'}으로 자동 분류`);
        defaultCategory = detected;  // 파일 내용 우선
      }

      // === 날짜 자동 인식 + 검증 ===
      const fileLabel = (defaultCategory === '3층') ? '신경계' : '근골';
      const thisSheetDate = extractSheetDate(ws, range);
      if(!state.importDates) state.importDates = {};

      // 프로그램에 이미 날짜가 있고 이번 파일 날짜와 다르면:
      //   확인 → 환자명·시간표 모두 지우고 프로그램 초기화 (파일 로드는 취소)
      //   취소 → 아무 것도 하지 않고 이번 파일 로드만 취소
      // state.date가 세팅되는 경로: 이전 파일 자동 로드, JSON 복원, 병실현황 백업 등
      if(thisSheetDate && state.date && thisSheetDate !== state.date){
        const fmt = s => { const [y,mo,d]=s.split('-'); return `${y}년 ${mo}월 ${d}일`; };
        const reset = confirm(
          `⚠️ 날짜가 일치하지 않습니다!\n\n`+
          `• 프로그램 날짜: ${fmt(state.date)}\n`+
          `• ${fileLabel} 파일 날짜: ${fmt(thisSheetDate)}\n\n`+
          `[확인]을 누르면 환자명·시간표를 모두 지우고 프로그램을 초기화합니다.\n`+
          `       (이번에 고른 파일은 자동입력되지 않습니다.\n`+
          `        초기화 후 필요한 파일을 다시 불러와 주세요.)\n\n`+
          `[취소]를 누르면 아무 것도 하지 않고 이번 파일 로드만 취소합니다.`
        );
        ev.target.value = '';
        if(reset){
          // 모두 지우기: 환자명 + 시간표 셀 + 날짜/카운트/importDates 전부
          initState();
          state.importDates = {};
          state.date = '';
          state.loadCounts = {roster:0, neuro:0, muscle:0};
          saveLocal();
          render();
          updateLoadIndicators();
          updateDateDisplay();
          showStatus('날짜 불일치로 모두 초기화했습니다. 필요한 파일을 다시 불러오세요.');
        }
        return;
      }
      // 엑셀 날짜를 state.date에 자동 적용
      if(thisSheetDate){
        state.date = thisSheetDate;
        state.importDates[fileLabel] = thisSheetDate;
        updateDateDisplay();
      }

      // 밑줄 친 셀 = 액팅 처리 → 이동반 제외 대상
      const underlineSet = buildUnderlineSet(wb, sheetName);
      if(underlineSet.size > 0) console.log('[자동입력] 밑줄(제외) 셀:', underlineSet.size, '개');

      // 컬럼 헤더 분석 (CPM→1층, 시행(3층)→3층, 외래/재택→제외)
      const colHeaders = buildColHeaders(ws, range);

      // === ST/언어 가로 서브섹션 사전 스캔 ===
      // 예: R19에 OT|...|로봇OT|ST 같이 가로로 서브섹션이 나열됨
      // 정확히 라벨만 있는 셀만 인식 (S환자명 prefix와 구분)
      const stColumns = new Set();
      // 단독 라벨로 인식할 정규식 (셀 내용이 정확히 라벨이거나, 라벨 + 공백/줄바꿈 only)
      const SECTION_LABEL = /^(OT|NDT|PT|ST|MAT|FES|GAIT|RAT|로봇\s*OT|로봇|매트|회복기|통증|언어|스피치|speech)\s*$/i;
      const ST_LABEL = /^(ST|언어|스피치|speech)\s*$/i;
      for(let r = range.s.r; r <= range.e.r; r++){
        const labels = [];
        for(let c = range.s.c + 1; c <= range.e.c; c++){
          const cell = ws[XLSX.utils.encode_cell({r, c})];
          if(!cell || typeof cell.v !== 'string') continue;
          const v = cell.v.trim();
          if(!v) continue;
          if(SECTION_LABEL.test(v)){
            labels.push({col:c, label:v});
          }
        }
        // 라벨이 2개 이상 있어야 헤더 행으로 인정 (단일 라벨은 무시)
        if(labels.length < 2) continue;
        labels.forEach((lbl, idx)=>{
          if(!ST_LABEL.test(lbl.label)) return;
          // 다음 라벨까지를 ST 영역으로 (없으면 +10 컬럼 제한)
          const endCol = idx + 1 < labels.length
            ? labels[idx+1].col - 1
            : Math.min(lbl.col + 10, range.e.c);
          for(let cc = lbl.col; cc <= endCol; cc++) stColumns.add(cc);
        });
      }
      if(stColumns.size > 0) console.log('[자동입력] ST 컬럼:', [...stColumns].sort((a,b)=>a-b));

      let filledCount = 0;
      const unmatched = new Set();
      const matched = new Set();
      // 동명이인 경고: 환자 이름 뒤에 숫자(김만엽1 등)가 붙어 시트에 여러 번호로
      // 나타나는 경우. 우리 명단엔 같은 이름이 한 명뿐이라 어느 번호가
      // 우리 환자인지 확인이 필요 → 경고. {name -> Set(번호들)}
      const homonymHits = {};
      const plainHits = {};   // 번호 없이 매칭된 이름 (한쪽만 번호 붙은 모호 감지용)
      let currentCategory = defaultCategory;  // 섹션에 따라 변경됨
      const sectionCounts = {};  // 디버깅용

      for(let r = range.s.r; r <= range.e.r; r++){
        // A열에서 섹션 헤더 감지 (NDT/OT/통증/ST 등)
        const cellA = ws[XLSX.utils.encode_cell({r, c: range.s.c})];
        if(cellA && cellA.v != null && typeof cellA.v === 'string'){
          const label = String(cellA.v).trim();
          if(label){
            // 시간 표기가 아닌 문자열 → 섹션 헤더로 간주
            if(/^통증/.test(label)){
              currentCategory = '통증';
              sectionCounts[label] = '통증';
              continue;
            }else if(/^(ST|언어|스피치|speech)/i.test(label)){
              currentCategory = '1층';  // 신경계 ST/언어 → 1층 (단 이름에 (3층) 있으면 3층 override)
              sectionCounts[label] = '1층';
              continue;
            }else if(/^(NDT|PT|OT|MAT|GAIT|FES|매트|로봇|회복기|신경계|근골|1층|기구)/.test(label)){
              currentCategory = defaultCategory;
              sectionCounts[label] = defaultCategory;
              continue;
            }
            // 점심시간/공지 등 그 외 문자열은 그냥 건너뛰기 (currentCategory 유지)
            if(!/^[\d.:~ ]+$/.test(label)) continue;
          }
        }

        // 이 행의 시간 슬롯 찾기 (A열 또는 그 근처)
        let timeSlot = null;
        for(let c = range.s.c; c <= Math.min(range.s.c + 20, range.e.c); c++){
          const ref = XLSX.utils.encode_cell({r, c});
          const cell = ws[ref];
          if(!cell) continue;
          const t = parseTimeValue(cell.v, cell.w);
          if(t){ timeSlot = t; break; }
        }
        if(!timeSlot){
          // 시간슬롯 없는 행 → 건너뛰지만, 한글 이름이 있으면 로그 (놓친 환자 진단용)
          for(let c = range.s.c; c <= range.e.c; c++){
            const cell = ws[XLSX.utils.encode_cell({r, c})];
            if(!cell || cell.v == null || cell.v === '') continue;
            const v = String(cell.v);
            if(/[가-힣]{2,}/.test(v) && !parseTimeValue(cell.v, cell.w)){
              console.log(`[시간없는행에서한글발견] r=${r} c=${c} 값="${v.replace(/\n/g,'⏎').slice(0,50)}"`);
            }
          }
          continue;
        }

        // 시간이 있는 행 → 모든 셀에서 환자명 추출
        for(let c = range.s.c; c <= range.e.c; c++){
          const ref = XLSX.utils.encode_cell({r, c});
          const cell = ws[ref];
          if(!cell || cell.v == null || cell.v === '') continue;
          // 시간 셀은 건너뜀
          if(parseTimeValue(cell.v, cell.w)) continue;
          // 밑줄 친 셀(액팅 처리) → 이동반 제외
          if(underlineSet.has(ref)){
            console.log(`[밑줄제외] ${ref} "${String(cell.v).replace(/\n/g,'⏎').slice(0,20)}" → 이동반 제외`);
            continue;
          }
          // 컬럼 헤더 오버라이드 (CPM→1층, 시행(3층)→3층, 외래/재택→제외)
          const colOv = getColOverride(colHeaders, r, c);
          if(colOv && colOv.exclude){
            console.log(`[컬럼제외] ${ref} "${String(cell.v).replace(/\n/g,'⏎').slice(0,20)}" → 이동반 제외 (외래/재택 컬럼)`);
            continue;
          }

          const items = extractPatientNames(cell.v, nameMap);

          // 바로 아래 셀에만 단독 태그(다른 내용 없이)가 있는지 보수적으로 확인
          let adjacentOverride = null;
          let adjacentExclude = false;
          const TAG_ONLY = /^\s*(\(침상\)|\(HOLD\)|\(병동\)|\(1층\)|\(3층\)|\(외래\)|\(치료실\s*[→\->]+\s*병동\)|\(병동\s*[→\->]+\s*치료실\))\s*$/;
          // 아래 1칸만 확인. 더 멀리 보면 다른 환자 태그를 잘못 잡을 위험이 큼.
          const offsets = [[1,0]];
          for(const [dr, dc] of offsets){
            const adjCell = ws[XLSX.utils.encode_cell({r: r+dr, c: c+dc})];
            if(!adjCell || adjCell.v == null) continue;
            const sAdj = String(adjCell.v).trim();
            const matchAdj = sAdj.match(TAG_ONLY);
            if(!matchAdj) continue;  // 단독 태그가 아니면 건너뜀
            const tagAdj = matchAdj[1];
            if(/침상|HOLD|^\(외래\)$/i.test(tagAdj)){ adjacentExclude = true; }
            else if(/^\(병동\)$/.test(tagAdj)){ adjacentOverride = '병동'; }
            else if(/^\(1층\)$/.test(tagAdj)){ adjacentOverride = '1층'; }
            else if(/^\(3층\)$/.test(tagAdj)){ adjacentOverride = '3층'; }
            else if(/치료실\s*[→\->]+\s*병동/.test(tagAdj)){ adjacentOverride = '3층'; }
            else if(/병동\s*[→\->]+\s*치료실/.test(tagAdj)){ adjacentOverride = '병동'; }
            if(adjacentOverride || adjacentExclude){
              console.log(`[인접태그] (r=${r},c=${c}) 바로아래 "${tagAdj}" → override=${adjacentOverride||'-'} exclude=${adjacentExclude}`);
              break;
            }
          }

          items.forEach(({name, override, exclude, homonymNum})=>{
            // 셀 내부 태그가 없으면 인접 셀의 태그를 적용
            const effOverride = override || adjacentOverride;
            const effExclude = exclude || adjacentExclude;

            // 디버그: 매칭은 됐는데 태그를 아예 못 찾았을 때 주변 셀 덤프
            const m_ = nameMap[name];
            if(m_ && m_.length > 0 && !effOverride && !effExclude){
              const dump = [];
              for(let dr = -1; dr <= 4; dr++){
                for(let dc = -1; dc <= 2; dc++){
                  const cAdj = ws[XLSX.utils.encode_cell({r: r+dr, c: c+dc})];
                  if(cAdj && cAdj.v != null && cAdj.v !== ''){
                    const val = String(cAdj.v).replace(/\n/g,'⏎').slice(0, 25);
                    dump.push(`[${dr>=0?'+':''}${dr},${dc>=0?'+':''}${dc}]"${val}"`);
                  }
                }
              }
              console.log(`[주변덤프] ${name} (r=${r},c=${c}) ← 태그 못찾음. 주변:`, dump.join(' '));
            }

            if(effExclude) return;
            if(m_ && m_.length > 0){
              // 컬럼 헤더가 카테고리를 지정하면 그게 섹션보다 우선
              // 단, ST 컬럼이라도 셀에 '+운동기구'가 붙으면 1층이 아니라 3층
              //   (전기자극류 +전기/+V/+안면전기/+taVNS/+TDCS 등은 1층 유지)
              let stCat = '1층';
              if(stColumns.has(c)){
                const cellTxt = String(cell.v);
                const hasGear = /\+/.test(cellTxt);
                const isEstim = /\+\s*(전기|안면전기|전기펜|전기장갑|V|taVNS|TDCS|tDCS)/i.test(cellTxt);
                if(hasGear && !isEstim) stCat = '3층';  // +런닝/+코로/+슬라 등 운동기구 → 3층
              }
              const colCategory = (colOv && colOv.cat) ? colOv.cat
                                : stColumns.has(c) ? stCat
                                : currentCategory;

              // 동명이인 처리:
              //  ① 시트 번호(homonymNum)가 명단의 번호(num)와 정확히 일치하면 그 1명으로 확정.
              //     (예: 명단 '이종례2'만 있고 시트 'H이종례2' → 즉시 매칭, 모호 아님)
              //  ② 시트엔 번호 없는데(plain) 명단의 같은 이름이 모두 번호 붙어 있으면 → 다른 사람
              //     (예: 명단 '이종례2'만 있고 시트 'H이종례' → 외래·타병동의 다른 이종례 → 채움 제외)
              //  ③ 시트엔 번호 있는데 명단엔 같은 번호가 없고 같은 이름 여러 명이면:
              //     사용자가 지정한 매핑(state.homonymMap) 우선, 없으면 번호 순서 임시 매칭 + 패널 띄움.
              //  ④ 시트엔 번호 있는데 명단엔 1명뿐 + 번호 안 맞으면(시트=2번인데 명단엔 번호 없는 1명)
              //     → 외래·타병동 동명이인 의심 (rosterCount=1 그대로 → ambiguous 알림).
              let targets = m_;
              let exactNumMatch = false;
              let skipDifferentPerson = false;
              if(homonymNum){
                // ① 정확 번호 매칭 우선
                const exact = m_.find(x => x.num === homonymNum);
                if(exact){
                  targets = [exact];
                  exactNumMatch = true;
                  // 모호 알림에 잡히지 않게 homonymHits에는 추가하지 않음
                }else{
                  if(!homonymHits[name]) homonymHits[name] = {nums:new Set(), rosterCount:m_.length, rooms:m_.map(x=>x.room)};
                  homonymHits[name].nums.add(homonymNum);
                  if(m_.length > 1){
                    const userMap = state.homonymMap[name];
                    if(userMap && userMap[homonymNum] != null){
                      // ③ 사용자 지정 호실로 매칭
                      const targetRoom = userMap[homonymNum];
                      const found = m_.find(x=>x.room === targetRoom);
                      targets = found ? [found] : m_;
                    }else{
                      // ③ 임시: 번호 순서(호실 오름차순)
                      const idx = parseInt(homonymNum) - 1;
                      if(idx >= 0 && idx < m_.length) targets = [m_[idx]];
                    }
                  }
                }
              }else{
                // 시트엔 번호 없음 — 명단의 '번호 없는' 항목만 같은 사람으로 인정
                // (명단 '이종례2'는 시트 'H이종례'와 다른 사람: 외래·타병동의 이종례)
                const plain = m_.filter(x => x.num === null);
                if(plain.length === 0){
                  // 명단엔 모두 번호 붙은 동명이인뿐 → 시트의 plain은 다른 사람
                  skipDifferentPerson = true;
                  console.log(`[자동입력 skip] "${name}": 명단엔 모두 번호(${m_.map(x=>x.num).join(',')}) — 시트엔 번호 없음 → 다른 사람으로 보고 자동입력 제외`);
                }else{
                  targets = plain;
                }
              }

              // 시트는 번호 없는데 명단엔 모두 번호 — 다른 사람으로 보고 채움 제외
              if(skipDifferentPerson) return;

              // 번호 없이 매칭된 경우도 추적 (한쪽만 번호 붙은 모호 케이스 감지)
              if(!homonymNum && targets.length >= 1){
                if(!plainHits[name]) plainHits[name] = true;
              }

              targets.forEach(({room, p, tag})=>{
                const finalCat = effOverride || tag || colCategory;
                const key = makeCellKey(room, p, timeSlot);

                // 태그/명단태그/컬럼헤더로 정해진 값은 '우선'으로 보호 (일반 섹션값이 덮어쓰지 못함)
                const isOverride = !!(effOverride || tag || (colOv && colOv.cat));
                if(isOverride){
                  state.rooms[room].cells[key] = finalCat;
                  state.cellSource[key] = 'override';
                  console.log(`[자동입력] ${name} → ${room}호p${p} ${timeSlot}: ${finalCat} [우선]`);
                  filledCount++;
                  matched.add(name);
                }else if(state.cellSource[key] !== 'override'){
                  state.rooms[room].cells[key] = finalCat;
                  state.cellSource[key] = 'default';
                  console.log(`[자동입력] ${name} → ${room}호p${p} ${timeSlot}: ${finalCat} [일반]`);
                  filledCount++;
                  matched.add(name);
                }else{
                  console.log(`[자동입력보호] ${name} → ${room}호p${p} ${timeSlot}: 기존 우선값 유지 (일반 ${finalCat} 무시)`);
                  matched.add(name);
                }
              });
            }else{
              unmatched.add(name);
            }
          });
        }
      }

      // 카운트 저장 + 인디케이터 업데이트
      const indKey = defaultCategory === '3층' ? 'neuro' : 'muscle';
      state.loadCounts[indKey] = filledCount;
      // 검증용 원본 보관 (세션 메모리) — 나중에 '검증' 버튼이 이 원본으로 대조
      lastImport[indKey] = { wb, sheetName, defaultCategory };
      saveLocal();
      render();
      updateLoadIndicators();

      const unmList = [...unmatched];
      const _sheetDate = extractSheetDate(ws, range);
      const _dateNote = _sheetDate
        ? (_sheetDate === state.date ? ` · 📅 날짜 일치(${_sheetDate})` : ` · ⚠️ 날짜 다름(파일 ${_sheetDate})`)
        : '';
      // 동명이인 처리 결과 분류
      const homNames = Object.keys(homonymHits);
      const resolvable = [];  // 명단 여러 명 → 사용자 매핑으로 정확히 가능
      const ambiguous = [];   // 명단 1명뿐 등 → 확인 필요(외래 의심)
      homNames.forEach(nm=>{
        const info = homonymHits[nm];
        if(info.rosterCount > 1){
          resolvable.push(nm);   // 호실 매핑 패널 대상
        }else{
          ambiguous.push({name:nm, nums:[...info.nums].sort()});
        }
      });

      const _homNote = (resolvable.length||ambiguous.length)
        ? ` · 👥 동명이인 ${resolvable.length+ambiguous.length}명`
        : '';
      const _detectNote = buttonWasWrong
        ? ` · 🔀 파일 자동감지: ${defaultCategory==='3층'?'신경계(3층)':'근골(1층)'}으로 분류함`
        : '';
      let msg = `자동 채움: ${filledCount}개 셀 (${matched.size}명 매칭, 시트: ${sheetName})${_dateNote}${_homNote}${_detectNote}`;
      console.log('[자동입력] 인식한 섹션:', sectionCounts);
      if(unmList.length > 0){
        console.log('[미매칭 환자명 — 다른 병동이거나 이름 차이일 수 있음]', unmList);
      }
      showStatus(msg);

      // 버튼과 파일이 안 맞아 자동 분류했으면 명확히 안내
      if(buttonWasWrong){
        const btnName = defaultCategory === '3층' ? '근골' : '신경계';
        const realName = defaultCategory === '3층' ? '신경계' : '근골';
        alert(
          `🔀 파일을 자동으로 알맞게 분류했습니다.\n\n`+
          `'${btnName}' 버튼을 누르셨지만, 파일 내용은 '${realName}' 시간표입니다.\n`+
          `→ 파일에 맞춰 ${defaultCategory==='3층'?'3층':'1층'}으로 정확히 채웠습니다.\n\n`+
          `버튼과 상관없이 파일 내용대로 처리되니 안심하세요.`
        );
      }

      // 동명이인 설정 패널 표시 (명단에 여러 명 → 번호↔호실 직접 지정)
      if(resolvable.length > 0){
        renderHomonymPanel(resolvable, homonymHits);
      }

      // 명단 1명뿐인데 번호가 붙음 → 외래 동명이인 의심, 경고
      if(ambiguous.length > 0){
        const lines = ambiguous.map(a=>
          `• ${a.name} — 시트엔 ${a.name}${a.nums.join('·'+a.name)} 로 나오는데 우리 병동엔 1명뿐`
        ).join('\n');
        alert(
          `⚠️ 확인이 필요한 동명이인이 있어요 (${ambiguous.length}명)\n\n`+
          `아래 환자는 치료 시트에 번호로 여러 명 나오지만, 우리 병동 명단에는\n`+
          `1명뿐입니다. 외래·타병동 동명이인이 섞였을 수 있으니 해당 칸을\n`+
          `직접 확인해 주세요:\n\n`+
          lines + `\n\n`+
          `(맞는 치료만 남기고 잘못 들어간 칸은 수정/삭제하세요)`
        );
      }

      // 매칭 0건이면 시트 안내
      if(matched.size === 0 && Object.keys(nameMap).length > 0){
        alert(`매칭 0건입니다.\n\n사용한 시트: "${sheetName}"\n파일의 다른 시트: ${wb.SheetNames.join(', ')}\n\n• 다른 날짜 시트일 수 있어요. 위 날짜 입력란을 보고서 날짜에 맞춰주세요.\n• 또는 병실현황을 먼저 불러왔는지 확인해주세요.`);
      }
    }catch(err){
      console.error('자동 채우기 에러:', err);
      alert('자동 채우기 실패: '+err.message+'\n\n환자명을 직접 입력하시거나 다른 방식을 사용해주세요.');
    }
  };
  reader.readAsArrayBuffer(file);
  ev.target.value = '';
}

// ===== RBCLR 엑셀 불러오기 (환자명만) =====
function importXLSX(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(new Uint8Array(e.target.result), {
        type:'array',
        cellFormula:false,
        cellStyles:false,
        cellNF:false,
        cellHTML:false,
        cellText:false,
        bookVBA:false,
        bookSheets:false
      });
      let sheetName = wb.SheetNames.find(n=>n.includes('수정') && n.includes('이동반'))
                    || wb.SheetNames.find(n=>n.includes('수정'))
                    || wb.SheetNames.find(n=>n.includes('이동반'))
                    || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = readSheetAsRows(ws);

      let imported = 0;
      let currentRoom = null;
      let patientIdx = 0;

      rows.forEach(row=>{
        // 첫 컬럼: 호실 번호 또는 빈칸
        const c0 = String(row[0]||'').trim();
        const c1 = String(row[1]||'').trim();
        if(/^[45]\d{2}$/.test(c0)){
          const r = parseInt(c0);
          if(ALL_ROOMS.includes(r)){
            currentRoom = r;
            patientIdx = 0;
          }else{
            currentRoom = null;
            return;
          }
        }
        if(currentRoom && patientIdx < PATIENTS_PER_ROOM){
          // 두 번째 컬럼이 환자 이름
          if(c1){
            state.rooms[currentRoom].patients[patientIdx].name = c1;
            imported++;
          }
          patientIdx++;
        }
      });

      saveLocal();
      render();
      showStatus(`환자명 ${imported}개 불러옴`);
    }catch(err){
      alert('엑셀 읽기 실패: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  ev.target.value = '';
}

// ===== 초기화 =====
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>setView(t.dataset.floor));
});

// 날짜는 사용자가 입력하지 않음 — 병실현황/신경계/근골 파일을 import할 때 자동 인식됨
initState();
loadLocal();

// === 지난 날짜 자동 초기화 ===
// 저장된 시간표의 날짜가 '오늘'이 아니면(전날 이후 다시 연 경우) 시간표를 비운다.
// 어제 데이터가 남아 층(3층/1층 등)이 옛날 값으로 잘못 표시되는 문제를 원천 차단.
// 날짜 정보가 아예 없으면(과거 버전 저장분 등) 안전하게 그대로 두고 사용자 판단에 맡긴다.
(function clearIfStale(){
  const today = getTodayStr();
  if(state.date && state.date !== today){
    // 시간표 셀·자동입력 흔적만 비우고, 환자명·날짜는 그대로 유지
    // (환자명은 병실현황에서 다시 불러오는 게 정석이지만, 남겨두면 참고용으로 유용)
    ALL_ROOMS.forEach(r=>{ state.rooms[r].cells = {}; });
    state.cellSource = {};
    state.homonymMap = {};
    state.importDates = {};
    state.loadCounts = {roster: state.loadCounts.roster || 0, neuro:0, muscle:0};
    // 지난 날짜는 제거 → 오늘 파일을 불러오면 날짜 불일치 창 없이 바로 채워짐
    state.date = '';
    saveLocal();
  }
})();

// 탭 동기화
document.querySelectorAll('.tab').forEach(t=>{
  t.classList.toggle('active', t.dataset.floor === state.view);
});
// 인디케이터·날짜 복원
updateLoadIndicators();
updateDateDisplay();
render();
</script>
